name: Dataspace Compliance Evidence

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  offline-evidence:
    name: Offline compliance checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install offline test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest cryptography pyyaml

      - name: Generate compliance artifacts
        env:
          PYTHONPATH: libs/governance/src
        run: |
          python scripts/compliance_validate.py --profile core --write-artifacts

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataspace-compliance-evidence
          path: |
            reports/compliance/
