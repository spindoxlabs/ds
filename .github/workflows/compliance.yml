name: Dataspace Compliance Evidence

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  offline-evidence:
    name: Governance validation and audit evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install ds-governance
        working-directory: libs/governance
        run: uv sync --extra dev

      - name: Run governance validator tests
        working-directory: libs/governance
        run: uv run pytest tests/tests/ -q

      - name: Validate governance and generate compliance artifacts
        working-directory: libs/governance
        run: |
          uv run ds-governance evidence \
            --file ../../services/connector/governance/governance.yaml \
            --owners ../../services/identity-registry/seed/owners.dev.yaml \
            --participants ../../services/connector/governance/participants.yaml \
            --name core \
            --out-dir ../../reports/compliance

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataspace-compliance-evidence
          path: |
            reports/compliance/
