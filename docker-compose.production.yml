# Production override for docker-compose.runtime.yml.
# Requires Docker Compose with the !override merge tag.
# Usage:
#   docker compose --env-file .env.production -f docker-compose.runtime.yml -f docker-compose.production.yml up -d

secrets:
  edc_api_key:
    file: ${EDC_API_KEY_FILE:?Set EDC_API_KEY_FILE}
  auth_secret:
    file: ${AUTH_SECRET_FILE:?Set AUTH_SECRET_FILE}
  keycloak_client_secret:
    file: ${AUTH_KEYCLOAK_SECRET_FILE:?Set AUTH_KEYCLOAK_SECRET_FILE}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?Set POSTGRES_PASSWORD_FILE}
  edc_provider_config:
    file: ${EDC_PROVIDER_CONFIG_FILE:?Set EDC_PROVIDER_CONFIG_FILE}
  edc_consumer_config:
    file: ${EDC_CONSUMER_CONFIG_FILE:?Set EDC_CONSUMER_CONFIG_FILE}
  edc_provider_vault:
    file: ${EDC_PROVIDER_VAULT_FILE:?Set EDC_PROVIDER_VAULT_FILE}
  edc_consumer_vault:
    file: ${EDC_CONSUMER_VAULT_FILE:?Set EDC_CONSUMER_VAULT_FILE}

services:
  postgres:
    ports: !override []
    secrets:
      - postgres_password
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: postgres

  caddy:
    volumes: !override
      - ${PRODUCTION_CADDYFILE:?Set PRODUCTION_CADDYFILE}:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks: !override
      dataspaces:
        aliases:
          - provider.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}
          - consumer.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}
          - trust-anchor.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}
          - users.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}

  identity-registry:
    ports: !override []
    secrets:
      - postgres_password
    environment: !override []
    command:
      - sh
      - -c
      - |
        export IDENTITY_REGISTRY_DATABASE_URL="postgresql+asyncpg://postgres:$$(cat /run/secrets/postgres_password)@postgres:5432/identity_registry"
        exec uvicorn identity_registry.main:app --host 0.0.0.0 --port 30005 --workers 1

  edc-provider:
    ports: !override []
    secrets:
      - edc_api_key
      - edc_provider_config
      - edc_provider_vault
    volumes: !override []
    environment: !override []
    command:
      - sh
      - -c
      - |
        export EDC_API_KEY="$$(cat /run/secrets/edc_api_key)"
        exec java $$JAVA_OPTS -Dedc.fs.config=/run/secrets/edc_provider_config -jar /connector.jar

  edc-consumer:
    ports: !override []
    secrets:
      - edc_api_key
      - edc_consumer_config
      - edc_consumer_vault
    volumes: !override []
    environment: !override []
    command:
      - sh
      - -c
      - |
        export EDC_API_KEY="$$(cat /run/secrets/edc_api_key)"
        exec java $$JAVA_OPTS -Dedc.fs.config=/run/secrets/edc_consumer_config -jar /connector.jar

  connector-db-create:
    secrets:
      - postgres_password
    environment: !override []
    command: |
      sh -c 'export PGPASSWORD="$$(cat /run/secrets/postgres_password)" &&
      until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'connector'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE connector"'

  connector-db-init:
    secrets:
      - postgres_password
    environment: !override []
    command:
      - sh
      - -c
      - |
        export CONNECTOR_DATABASE_URL="postgresql+asyncpg://postgres:$$(cat /run/secrets/postgres_password)@postgres:5432/connector"
        exec alembic --config alembic.ini upgrade head

  ds-connector:
    ports: !override []
    secrets:
      - edc_api_key
      - postgres_password
    volumes: !override
      - ./services/connector/governance:/governance:ro
    environment: !override
      EDC_PROVIDER_MANAGEMENT_URL: http://edc-provider:19193/management
      EDC_PROVIDER_PROTOCOL_URL: http://edc-provider:19194/protocol/2025-1
      EDC_CONSUMER_MANAGEMENT_URL: http://edc-consumer:29193/management
      EDC_CONSUMER_PROTOCOL_URL: http://edc-consumer:29194/protocol/2025-1
      EDC_API_KEY_FILE: /run/secrets/edc_api_key
      CONNECTOR_PARTICIPANT_BASE_URL: https://provider.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}
      CONNECTOR_PARTICIPANT_DID: ${PROVIDER_DID_WEB:?Set PROVIDER_DID_WEB}
      CONNECTOR_CONSUMER_PARTICIPANT_DID: ${CONSUMER_DID_WEB:?Set CONSUMER_DID_WEB}
      CONNECTOR_TRUST_ANCHOR_DID: ${TRUST_ANCHOR_DID_WEB:?Set TRUST_ANCHOR_DID_WEB}
      CONNECTOR_PARTICIPANT_ID: provider
      CONNECTOR_DATASET_API_URL: http://dataset-api:30002
      CONNECTOR_PROVENANCE_URL: http://ds-provenance:30000
      CONNECTOR_IDENTITY_REGISTRY_URL: http://identity-registry:30005
      CONNECTOR_GOVERNANCE_YAML_PATH: /governance/governance.yaml
    command:
      - sh
      - -c
      - |
        export CONNECTOR_DATABASE_URL="postgresql+asyncpg://postgres:$$(cat /run/secrets/postgres_password)@postgres:5432/connector"
        exec uvicorn connector.main:app --host 0.0.0.0 --port 30001 --workers 1

  ds-portal:
    secrets:
      - auth_secret
      - keycloak_client_secret
    command:
      - sh
      - -c
      - |
        export AUTH_SECRET="$$(cat /run/secrets/auth_secret)"
        export AUTH_KEYCLOAK_SECRET="$$(cat /run/secrets/keycloak_client_secret)"
        exec node build
    environment: !override
      AUTH_SECRET_FILE: /run/secrets/auth_secret
      AUTH_KEYCLOAK_SECRET_FILE: /run/secrets/keycloak_client_secret
      CONNECTOR_URL: http://ds-connector:30001
      DATASET_API_URL: http://dataset-api:30002
      CATALOGUE_URL: http://dataset-api:30002
      FEDERATED_CATALOG_URL: http://ds-federated-catalog:30003
      PROVENANCE_URL: http://ds-provenance:30000
      USER_CREDENTIALS_PATH: /credentials/users
      CONSUMER_DEFAULT_COUNTER_PARTY_ADDRESS: ${CONSUMER_DEFAULT_COUNTER_PARTY_ADDRESS:?Set CONSUMER_DEFAULT_COUNTER_PARTY_ADDRESS}
      CONSUMER_DEFAULT_ASSIGNER: ${CONSUMER_DEFAULT_ASSIGNER:?Set CONSUMER_DEFAULT_ASSIGNER}
      ORIGIN: ${ORIGIN:?Set ORIGIN}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?Set NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:?Set AUTH_KEYCLOAK_ISSUER}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:?Set AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SCOPE: ${AUTH_KEYCLOAK_SCOPE:?Set AUTH_KEYCLOAK_SCOPE}
      KEYCLOAK_CLIENT_ID: ${AUTH_KEYCLOAK_ID:?Set AUTH_KEYCLOAK_ID}

  dataset-api:
    ports: !override []
    environment: !override
      DATASET_API_CONNECTOR_INTERNAL_URL: http://ds-connector:30001
      DATASET_API_ENFORCE_CONSENT: "true"

  ds-provenance:
    ports: !override []
    secrets:
      - postgres_password
    environment: !override []
    command:
      - sh
      - -c
      - |
        export PROVENANCE_DATABASE_URL="postgresql+asyncpg://postgres:$$(cat /run/secrets/postgres_password)@postgres:5432/provenance"
        exec uvicorn provenance.main:app --host 0.0.0.0 --port 30000 --workers 1

  provenance-db-create:
    secrets:
      - postgres_password
    environment: !override []
    command: |
      sh -c 'export PGPASSWORD="$$(cat /run/secrets/postgres_password)" &&
      until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'provenance'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE provenance"'

  provenance-db-init:
    secrets:
      - postgres_password
    environment: !override []
    command:
      - sh
      - -c
      - |
        export PROVENANCE_DATABASE_URL="postgresql+asyncpg://postgres:$$(cat /run/secrets/postgres_password)@postgres:5432/provenance"
        exec alembic --config alembic.ini upgrade head

  ds-federated-catalog:
    ports: !override []
    environment: !override
      CATALOG_CONNECTOR_URL: http://ds-connector:30001
      CATALOG_IDENTITY_REGISTRY_URL: http://identity-registry:30005
      CATALOG_BASE_URL: https://federated-catalog.${PUBLIC_BASE_DOMAIN:?Set PUBLIC_BASE_DOMAIN}
