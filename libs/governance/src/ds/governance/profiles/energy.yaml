# ODRL profile for energy dataspaces.
#
# Ships as the platform default.  Deployers override by pointing
# CONNECTOR_ODRL_PROFILE_PATH to their own YAML (same schema).

namespace: "https://w3id.org/dsp/policy/"
prefix: "dsp-policy"

membership_operand: Membership
consent_operand: ConsentStatus
query_action: Query
# A path segment, not a pseudo-prefix: `purpose:` would produce IRIs that
# compact to `purpose:Slug`, which JSON-LD rejects as confusable with a compact
# IRI and which breaks the DSP catalogue response.
purpose_base: "purpose/"

# Authoring default only — `ds-governance scaffold` uses this to suggest a
# starting `policy.purpose[]` for a new dataset.  It is NOT runtime truth:
# the mapper reads `policy.purpose[]` and nothing else.  A tag is a DCAT-AP
# catalogue keyword (a topic); a purpose is a reason for processing.  One
# meter dataset can serve incentive calculation, flexibility research or cost
# optimisation, so mapping `meters -> <a purpose>` is a category error.
tag_to_purpose:
  meters: EnergyCommunityOperation
  grid: GridMonitoring

# Purpose taxonomy — served by GET /ns/policy as SKOS concepts.
#
# `broader` builds the local hierarchy and is the ONLY thing `odrl:isA`
# matching follows.  `dpv_mapping` aligns each concept with the W3C DPV v2.2
# vocabulary (https://w3id.org/dpv#) for interop and documentation; it is never
# matched against, because a broadMatch to a generic DPV term would let an
# unrelated use satisfy a specific consent.
purposes:
  - slug: EnergyCommunityOperation
    label: Energy community operation
    definition: Operating a renewable energy community on behalf of its members.
    dpv_mapping:
      iri: "https://w3id.org/dpv#ServiceProvision"
      relation: broadMatch

  - slug: IncentiveCalculation
    label: Incentive calculation
    definition: >-
      Computing shared-energy incentives and their distribution among members.
    broader: EnergyCommunityOperation
    dpv_mapping:
      iri: "https://w3id.org/dpv#FulfilmentOfObligation"
      relation: broadMatch

  - slug: CostOptimization
    label: Cost optimisation
    definition: Reducing energy cost for the member or the community.
    broader: EnergyCommunityOperation
    dpv_mapping:
      iri: "https://w3id.org/dpv#OptimisationForConsumer"
      relation: broadMatch

  - slug: FlexibilityResearch
    label: Flexibility research
    definition: >-
      Studying when and how much consumption can shift, to plan community
      flexibility.
    broader: EnergyCommunityOperation
    dpv_mapping:
      iri: "https://w3id.org/dpv#ResearchAndDevelopment"
      relation: broadMatch

  - slug: GridMonitoring
    label: Grid monitoring
    definition: Monitoring grid stability, load, and fault detection.
    dpv_mapping:
      iri: "https://w3id.org/dpv#PublicBenefit"
      relation: broadMatch
