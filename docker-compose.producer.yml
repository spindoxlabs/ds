# Producer participant stack.
# Requires shared infra (docker compose up -d) running first.
#
#   task producer:start

networks:
  dataspaces:
    name: dataspaces
    external: true

services:
  # ── EDC provider connector (Java, DCP-enabled) ──────────────────────────────
  edc-provider:
    build:
      context: .
      dockerfile: services/edc-connector/Dockerfile
    command:
      [
        "sh",
        "-c",
        "java $$JAVA_OPTS -Dedc.fs.config=/config/provider.properties -jar /connector.jar",
      ]
    volumes:
      - ./services/connector/config:/config:ro
      - ./services/connector/governance:/governance:ro
    ports:
      - "19193:19193"
      - "19194:19194"
      - "19291:19291"
      - "19195:19195"
    environment:
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      EDC_RECEIVER_HTTP_ENDPOINT: http://host.docker.internal:30001/webhooks/transfer-process
    depends_on:
      sts-provider:
        condition: service_healthy
      vc-wallet-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19191/api/check/health || exit 1"]
      interval: 10s
      start_period: 60s
      retries: 15
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "provider.dataspaces.localhost:host-gateway"
      - "consumer.dataspaces.localhost:host-gateway"
      - "trust-anchor.dataspaces.localhost:host-gateway"
      - "users.dataspaces.localhost:host-gateway"
    networks: [dataspaces]

  # ── STS provider ─────────────────────────────────────────────────────────────
  sts-provider:
    build:
      context: .
      dockerfile: services/sts/Dockerfile
    ports:
      - "38080:8080"
    environment:
      STS_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      STS_PRIVATE_KEY_PATH: /config/provider-key.json
      STS_CLIENT_ID: did:web:provider.dataspaces.localhost
      STS_CLIENT_SECRET: ${STS_PROVIDER_SECRET:-insecure-dev-secret}
    volumes:
      - ./services/connector/config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)\""]
      interval: 10s
      start_period: 10s
      retries: 10
    networks: [dataspaces]

  # ── VC wallet provider ───────────────────────────────────────────────────────
  vc-wallet-provider:
    build:
      context: .
      dockerfile: services/vc-wallet/Dockerfile
    ports:
      - "38082:8081"
    environment:
      VC_WALLET_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      VC_WALLET_CREDENTIALS_PATH: /credentials/provider
      VC_WALLET_PRIVATE_KEY_PATH: /config/provider-key.json
      VC_WALLET_CREDENTIAL_STATUS_PATH: /credentials/status-list.json
      VC_WALLET_CREDENTIAL_STATUS_URL: ${VC_WALLET_CREDENTIAL_STATUS_URL:-}
    volumes:
      - ./data/credentials:/credentials:ro
      - ./services/connector/config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=2)\""]
      interval: 10s
      start_period: 10s
      retries: 10
    networks: [dataspaces]

  # ── Database init ────────────────────────────────────────────────────────────
  connector-db-create-producer:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'connector_producer'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE connector_producer"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    networks: [dataspaces]

  connector-db-init-producer:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      connector-db-create-producer:
        condition: service_completed_successfully
    environment:
      CONNECTOR_ROLE: producer
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector_producer
    networks: [dataspaces]

  provenance-db-create-producer:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'provenance_producer'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE provenance_producer"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    networks: [dataspaces]

  provenance-db-init-producer:
    build:
      context: .
      dockerfile: services/provenance/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      provenance-db-create-producer:
        condition: service_completed_successfully
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/provenance_producer
    networks: [dataspaces]

  # ── Producer connector (Python orchestration) ───────────────────────────────
  ds-connector-producer:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    ports:
      - "30001:30001"
    environment:
      CONNECTOR_ROLE: producer
      EDC_PROVIDER_MANAGEMENT_URL: http://edc-provider:19193/management
      EDC_PROVIDER_PROTOCOL_URL: http://edc-provider:19194/protocol/2025-1
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      CONNECTOR_PARTICIPANT_ID: provider
      CONNECTOR_PARTICIPANT_BASE_URL: https://provider.dataspaces.localhost
      CONNECTOR_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      CONNECTOR_CONSUMER_PARTICIPANT_DID: did:web:consumer.dataspaces.localhost
      CONNECTOR_DATASET_API_URL: http://host.docker.internal:30002
      CONNECTOR_PROVENANCE_URL: http://host.docker.internal:30000
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector_producer
      CONNECTOR_PARTICIPANTS_REGISTRY_PATH: /governance/participants.yaml
      CONNECTOR_GOVERNANCE_YAML_PATH: /governance/governance.yaml
      CONNECTOR_TRUST_ANCHOR_KEY_PATH: /config/trust-anchor-key.json
      CONNECTOR_CREDENTIAL_STATUS_PATH: /credentials/status-list.json
      CONNECTOR_CREDENTIAL_STATUS_URL: ${CONNECTOR_CREDENTIAL_STATUS_URL:-}
    depends_on:
      edc-provider:
        condition: service_healthy
      connector-db-init-producer:
        condition: service_completed_successfully
      ds-provenance-producer:
        condition: service_healthy
    volumes:
      - ./services/connector/governance:/governance:ro
      - ./services/connector/config:/config:ro
      - ./data/credentials:/credentials:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:30001/health', timeout=2)\""]
      interval: 10s
      start_period: 20s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Producer provenance ──────────────────────────────────────────────────────
  ds-provenance-producer:
    build:
      context: .
      dockerfile: services/provenance/Dockerfile
    ports:
      - "30000:30000"
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/provenance_producer
    depends_on:
      provenance-db-init-producer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:30000/health', timeout=2)\""]
      interval: 10s
      start_period: 10s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Dataset API (mock, overridable via DATASET_API_EXTERNAL_QUERY_URL) ──────
  dataset-api-producer:
    build:
      context: .
      dockerfile: services/dataset-api-mock/Dockerfile
    ports:
      - "30002:30002"
    environment:
      DATASET_API_CONNECTOR_INTERNAL_URL: http://host.docker.internal:30001
      DATASET_API_EXTERNAL_QUERY_URL: ${DATASET_API_EXTERNAL_QUERY_URL:-}
      DATASET_API_ENFORCE_CONSENT: "true"
    depends_on:
      ds-connector-producer:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Federated catalog ────────────────────────────────────────────────────────
  ds-federated-catalog-producer:
    build:
      context: .
      dockerfile: services/federated-catalog/Dockerfile
    ports:
      - "30003:30003"
    environment:
      CATALOG_CONNECTOR_URL: http://host.docker.internal:30001
      CATALOG_PARTICIPANTS_YAML: /governance/participants.yaml
      CATALOG_BASE_URL: https://federated-catalog.dataspaces.localhost
    volumes:
      - ./services/connector/governance:/governance:ro
    depends_on:
      ds-connector-producer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:30003/health', timeout=2)\""]
      interval: 10s
      start_period: 20s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]
