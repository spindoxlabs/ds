version: "3"

tasks:
  setup:
    desc: Install Python dependencies (idempotent)
    cmds:
      - uv sync
    sources: [pyproject.toml]
    generates: [.venv/bin/uvicorn]

  run:
    desc: Run dev server with hot-reload on :30003
    deps: [setup]
    cmds:
      - uv run uvicorn federated_catalog.main:app --reload --port 30003

  debug:
    desc: Run dev server with debugpy on :30903, waiting for attach
    deps: [setup]
    cmds:
      - uv run python -m debugpy --listen 0.0.0.0:30903 --wait-for-client -m uvicorn federated_catalog.main:app --reload --port 30003

  release:
    desc: (noop — managed by CI/CD)
    cmds:
      - echo "release not configured"
