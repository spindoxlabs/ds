version: "3"

tasks:
  setup:
    desc: Install Python dependencies (idempotent)
    cmds:
      - uv sync
    sources: [pyproject.toml]
    generates: [.venv/bin/uvicorn]

  run:
    desc: Run dev server with hot-reload on :8080
    deps: [setup]
    cmds:
      - uv run uvicorn sts.main:app --reload --port 8080

  debug:
    desc: Run dev server with debugpy on :30908, waiting for attach
    deps: [setup]
    cmds:
      - uv run python -m debugpy --listen 0.0.0.0:30908 --wait-for-client -m uvicorn sts.main:app --reload --port 8080

  release:
    desc: (noop — managed by CI/CD)
    cmds:
      - echo "release not configured"
