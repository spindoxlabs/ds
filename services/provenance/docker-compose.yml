# Shared postgres must be running (docker compose up -d from repo root).

networks:
  dataspaces:
    name: dataspaces
    external: true

services:
  # ── DB init — runs alembic migrations, restarts until postgres is ready ───────
  provenance-db-init:
    build:
      context: ../..
      dockerfile: services/provenance/Dockerfile
    command: [ "alembic", "--config", "alembic.ini", "upgrade", "head" ]
    working_dir: /app
    restart: on-failure
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/provenance
    networks: [ dataspaces ]

  ds-provenance:
    build:
      context: ../..
      dockerfile: services/provenance/Dockerfile
    ports: [ "30000:30000" ]
    env_file:
      - path: ../../.env
        required: false
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/provenance
    depends_on:
      provenance-db-init:
        condition: service_completed_successfully
    networks: [ dataspaces ]
