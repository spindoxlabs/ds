# Local dev realm. In production, ds clients are in the celine realm
# via celine-policies/clients.yaml.
realm: dataspaces

# =============================================================================
# SCOPES
# =============================================================================

scopes:
  # Dataset
  - name: dataset.admin
    description: Full access to Dataset service (includes restricted datasets)
  - name: dataset.query
    description: Execute dataset queries
  - name: dataset.read
    description: Read dataset metadata and schema
  - name: dataset.write
    description: Write dataset data

  # Dataspace Identity Registry
  - name: identity-registry.admin
    description: Admin access to dataspace identity-registry API
  - name: identity-registry.read
    description: Read participant registry and request credential presentations
  - name: identity-registry.resolve
    description: Resolve user identity by email
  - name: identity-registry.membership.read
    description: Check organization membership

  # Connector
  - name: connector.admin
    description: Provider management (sync, assets, policies, contracts)
  - name: connector.provider.read
    description: Read provider assets, policies, contracts, transfers, authorizations
  - name: connector.provider.write
    description: Mutate provider config (sync, delete assets/policies/contracts)
  - name: connector.history.read
    description: Read EDC negotiation, agreement and transfer history
  - name: connector.internal
    description: Internal API (agreement/transfer/consent checks, audit, JWKS)
  - name: connector.webhook
    description: Accept EDC webhook events (transfer-process, contract-negotiation)
  - name: connector.consent.provision
    description: Provision a subject's standing sharing decision (POST /consent/admin/shares)
  - name: connector.ingestion.record
    description: Record a DSO/offline data handover (POST /admin/ingestion)

  # Provenance
  - name: provenance.read
    description: Query provenance lineage and audit log
  - name: provenance.write
    description: Write provenance events and audit log entries

  # Federated Catalog
  - name: catalog.read
    description: Query federated catalog

# =============================================================================
# CLIENTS
# =============================================================================

clients:
  - client_id: svc-ds-identity-registry
    name: Dataspace Identity Registry
    secret: ${SVC_DS_IDENTITY_REGISTRY_SECRET:-svc-ds-identity-registry}
    scopes_prefix: identity-registry
    default_scopes:
      - identity-registry.admin

  - client_id: svc-ds-onboarding
    name: Dataspace Onboarding
    secret: ${SVC_DS_ONBOARDING_SECRET:-svc-ds-onboarding}
    scopes_prefix: null
    default_scopes:
      - identity-registry.admin
      # Provision a subject's standing sharing decision on the connector after
      # onboarding approval (POST /consent/admin/shares).
      - connector.consent.provision
      # Emit a DataDisclosed provenance event after a CSV export (Block C).
      - provenance.write
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
      - svc-ds-provenance

  - client_id: svc-ds-portal
    name: Dataspace Portal
    secret: ${SVC_DS_PORTAL_SECRET:-svc-ds-portal}
    service_account_enabled: true
    scopes_prefix: null
    default_scopes:
      - dataset.query
      - dataset.read
      - identity-registry.resolve
      - identity-registry.read
      - identity-registry.membership.read
      - connector.admin
      - connector.history.read
      - provenance.read
      - catalog.read
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
      - svc-ds-provenance
      - svc-ds-federated-catalog

  - client_id: svc-ds-connector
    name: Dataspace Connector
    secret: ${SVC_DS_CONNECTOR_SECRET:-svc-ds-connector}
    scopes_prefix: connector
    default_scopes:
      - identity-registry.read
      - identity-registry.membership.read
      - provenance.write
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-provenance

  - client_id: svc-ds-federated-catalog
    name: Dataspace Federated Catalog
    secret: ${SVC_DS_FEDERATED_CATALOG_SECRET:-svc-ds-federated-catalog}
    scopes_prefix: catalog
    default_scopes:
      - identity-registry.read
    extra_audiences:
      - svc-ds-identity-registry

  - client_id: svc-ds-dataset-api
    name: Dataspace Dataset API
    secret: ${SVC_DS_DATASET_API_SECRET:-svc-ds-dataset-api}
    scopes_prefix: dataset
    default_scopes:
      - connector.internal
    extra_audiences:
      - svc-ds-connector

  - client_id: svc-edc
    name: Eclipse Dataspace Connector
    secret: ${SVC_EDC_SECRET:-svc-edc}
    scopes_prefix: null
    default_scopes:
      - identity-registry.read
      - connector.webhook
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
