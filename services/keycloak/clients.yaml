# Local dev realm. In production, ds clients are in the celine realm
# via celine-policies/clients.yaml.
realm: dataspaces

# =============================================================================
# SCOPES
# =============================================================================

scopes:
  # Dataset
  - name: dataset.admin
    description: Full access to Dataset service (includes restricted datasets)
  - name: dataset.query
    description: Execute dataset queries
  - name: dataset.read
    description: Read dataset metadata and schema
  - name: dataset.write
    description: Write dataset data

  # Dataspace Identity Registry
  - name: identity-registry.admin
    description: Admin access to dataspace identity-registry API
  - name: identity-registry.read
    description: Read participant registry and request credential presentations
  - name: identity-registry.resolve
    description: Resolve user identity by email
  - name: identity-registry.membership.read
    description: Check organization membership

  # Connector
  - name: connector.admin
    description: Provider management (sync, assets, policies, contracts)
  - name: connector.provider.read
    description: Read provider assets, policies, contracts, transfers, authorizations
  - name: connector.provider.write
    description: Mutate provider config (sync, delete assets/policies/contracts)
  - name: connector.history.read
    description: Read EDC negotiation, agreement and transfer history
  - name: connector.internal
    description: Internal API (agreement/transfer/consent checks, audit, JWKS)
  - name: connector.webhook
    description: Accept EDC webhook events (transfer-process, contract-negotiation)
  - name: connector.consent.provision
    description: Provision a subject's standing sharing decision (POST /consent/admin/shares)
  # Keycloak's client-scope description is VARCHAR(255) and the realm API
  # answers 500 rather than a validation error when it overflows — keep these
  # one short line each. The rationale lives in dependencies.py.
  - name: connector.consent.read
    description: Is a negotiation awaiting a consent decision (GET /consent/pending)
  - name: connector.ingestion.record
    description: Record a DSO/offline data handover (POST /admin/ingestion)

  # Provenance
  - name: provenance.read
    description: Query provenance lineage and audit log
  - name: provenance.write
    description: Write provenance events and audit log entries

  # Federated Catalog
  - name: catalog.read
    description: Query federated catalog

# =============================================================================
# CLIENTS
# =============================================================================

clients:
  - client_id: svc-ds-identity-registry
    name: Dataspace Identity Registry
    secret: ${SVC_DS_IDENTITY_REGISTRY_SECRET:-svc-ds-identity-registry}
    scopes_prefix: identity-registry
    default_scopes:
      - identity-registry.admin

  - client_id: svc-ds-onboarding
    name: Dataspace Onboarding
    secret: ${SVC_DS_ONBOARDING_SECRET:-svc-ds-onboarding}
    scopes_prefix: null
    default_scopes:
      - identity-registry.admin
      # Provision a subject's standing sharing decision on the connector after
      # onboarding approval (POST /consent/admin/shares).
      - connector.consent.provision
      # Emit a DataDisclosed provenance event after a CSV export (Block C).
      - provenance.write
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
      - svc-ds-provenance

  # No `*.admin` on a service client. Admin is an operator grant — it belongs to
  # an administrator's own token or an admin CLI acting under a named condition,
  # never to a long-lived process. It is also a superset ({service}.admin
  # satisfies any {service}.*), so putting it here would silently hand the portal
  # every connector permission that exists, including the machine-identity ones.
  # The portal gets exactly what its pages call.
  - client_id: svc-ds-portal
    name: Dataspace Portal
    secret: ${SVC_DS_PORTAL_SECRET:-svc-ds-portal}
    service_account_enabled: true
    scopes_prefix: null
    default_scopes:
      - dataset.query
      - dataset.read
      - identity-registry.resolve
      - identity-registry.read
      - identity-registry.membership.read
      # Provider console: asset/policy/contract/transfer listings, and the
      # governance sync button.
      - connector.provider.read
      - connector.provider.write
      - connector.history.read
      - provenance.read
      - catalog.read
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
      - svc-ds-provenance
      - svc-ds-federated-catalog

  # The e2e harness drives endpoints that belong to several different callers —
  # the provider console, the onboarding service, the dataset-api. It gets its
  # own client so those grants are visible as a test identity instead of being
  # smuggled into a production one, and so revoking it cannot break a service.
  # Never enable this client outside a dev or CI realm.
  - client_id: svc-ds-e2e
    name: Dataspace E2E Harness (dev/CI only)
    secret: ${SVC_DS_E2E_SECRET:-svc-ds-e2e}
    service_account_enabled: true
    scopes_prefix: null
    default_scopes:
      - dataset.query
      - dataset.read
      - identity-registry.resolve
      - identity-registry.read
      - identity-registry.membership.read
      - connector.provider.read
      - connector.provider.write
      - connector.history.read
      - connector.consent.provision
      - connector.ingestion.record
      # Machine-identity permissions: granted by name because they are exempt
      # from the admin superset (ds_auth.require_exact_permission).
      - connector.internal
      - provenance.read
      - provenance.write
      - catalog.read
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
      - svc-ds-provenance
      - svc-ds-federated-catalog

  - client_id: svc-ds-connector
    name: Dataspace Connector
    secret: ${SVC_DS_CONNECTOR_SECRET:-svc-ds-connector}
    scopes_prefix: connector
    default_scopes:
      - identity-registry.read
      - identity-registry.membership.read
      - provenance.write
      # A consumer connector asks the provider whether one of its own
      # negotiations is parked on a consent decision, so a long REQUESTED can be
      # shown as "waiting on a person" instead of as silence (§6.6).
      - connector.consent.read
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-provenance
      # The counterparty's connector — the audience of GET /consent/pending.
      - svc-ds-connector

  - client_id: svc-ds-federated-catalog
    name: Dataspace Federated Catalog
    secret: ${SVC_DS_FEDERATED_CATALOG_SECRET:-svc-ds-federated-catalog}
    scopes_prefix: catalog
    default_scopes:
      - identity-registry.read
    extra_audiences:
      - svc-ds-identity-registry

  - client_id: svc-ds-dataset-api
    name: Dataspace Dataset API
    secret: ${SVC_DS_DATASET_API_SECRET:-svc-ds-dataset-api}
    scopes_prefix: dataset
    default_scopes:
      - connector.internal
    extra_audiences:
      - svc-ds-connector

  - client_id: svc-edc
    name: Eclipse Dataspace Connector
    secret: ${SVC_EDC_SECRET:-svc-edc}
    scopes_prefix: null
    default_scopes:
      - identity-registry.read
      # "I am the EDC reporting its own negotiation state" — the webhook route
      # uses require_exact_permission, so connector.admin does not grant it.
      - connector.webhook
      # The ODRL constraint functions and the consent pending guard call
      # /internal/consent/check and /internal/participants/check. Before this
      # they presented X-Api-Key — the *same* secret as EDC's Management API
      # key, so one leak yielded contract administration, the data-plane
      # signing keys and the subject pools at once, and every /internal/* call
      # authenticated as the same anonymous bearer with no audit trail.
      - connector.internal
    extra_audiences:
      - svc-ds-identity-registry
      - svc-ds-connector
