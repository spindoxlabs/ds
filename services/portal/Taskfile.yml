version: "3"

tasks:
  setup:
    desc: Install Node dependencies (idempotent)
    cmds:
      - npm ci
    sources: [package.json, package-lock.json]
    generates: [node_modules/.package-lock.json]

  run:
    desc: Start SvelteKit dev server on :30004
    cmds:
      - npm run dev

  debug:
    desc: Start SvelteKit dev server with Node inspector on :30904
    cmds:
      - node --inspect=0.0.0.0:30904 node_modules/.bin/vite dev --port 30004

  release:
    desc: (noop — managed by CI/CD)
    cmds:
      - echo "release not configured"

  check:
    cmds:
      - npm run check

  lint:
    cmds:
      - npm run lint
