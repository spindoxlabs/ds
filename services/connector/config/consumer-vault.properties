# EDC filesystem vault for consumer
# Keys stored here are referenced by alias in .properties config.

# STS client secret (must match participant's sts_client_secret in identity-registry)
sts-consumer-client-secret=insecure-dev-secret

# EDR signing key — used by EDC data-plane for Endpoint Data Reference tokens.
# This is NOT the DID/identity key. DID keys are managed by the identity-registry.
participant-private-key={"kty":"EC","crv":"P-256","x":"placeholder-edr-key","y":"placeholder-edr-key","d":"placeholder-edr-key","kid":"edr-consumer-key-1","use":"sig"}
