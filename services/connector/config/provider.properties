edc.participant.id=did:web:provider.dataspaces.localhost
edc.iam.issuer.id=did:web:provider.dataspaces.localhost
edc.dsp.callback.address=http://172.17.0.1:19194/protocol
web.http.port=19191
web.http.path=/api
web.http.management.port=19193
web.http.management.path=/management
# `auth.type` is what actually installs the authentication filter: EDC only
# registers one for contexts whose `auth.type` is set, so `auth.key` alone left
# the Management API — create/delete assets and policies, terminate transfers,
# resume a parked negotiation — reachable without any credential at all.
web.http.management.auth.type=tokenbased
# The key itself comes from the environment as WEB_HTTP_MANAGEMENT_AUTH_KEY.
# It is NOT written here as ${EDC_API_KEY}: EDC's FsConfigurationExtension does a
# plain Properties.load() with no interpolation, so a ${...} placeholder is
# stored verbatim — the API key would literally have been the string
# "${EDC_API_KEY}". EDC does read the environment (ConfigurationLoader merges
# ConfigFactory.fromEnvironment), converting ENVIRONMENT_NOTATION to
# dot.notation, which is the mechanism used instead.
web.http.protocol.port=19194
web.http.protocol.path=/protocol
web.http.public.port=19291
web.http.public.path=/public
web.http.control.port=19192
web.http.control.path=/control
web.http.version.port=19195
web.http.version.path=/version
edc.dataplane.api.public.baseurl=http://172.17.0.1:19291/public
ds.edr.endpoint.public.baseurl=http://localhost:30002
edc.transfer.proxy.token.signer.privatekey.alias=participant-private-key
edc.transfer.proxy.token.verifier.publickey.alias=participant-private-key
edc.hostname=172.17.0.1

# ── DCP / Verifiable Credentials (Iteration 5) ───────────────────────────────
# Filesystem vault — stores participant private key for JWT signing
edc.vault.hashicorp.enabled=false
edc.vault.fs.file=/config/provider-vault.properties

# STS (Security Token Service) — issues SI tokens for DSP requests (via identity-registry)
edc.iam.sts.oauth.token.url=http://172.17.0.1:30005/sts/did:web:provider.dataspaces.localhost/token
edc.iam.sts.oauth.client.id=did:web:provider.dataspaces.localhost
edc.iam.sts.oauth.client.secret.alias=sts-provider-client-secret

# Trusted VC issuers — DIDs whose membership VCs are accepted
edc.iam.trusted-issuer.0.id=did:web:trust-anchor.dataspaces.localhost

# DCP scope used by DSP requests to ask the counterparty wallet for membership VCs.
edc.iam.dcp.scopes.membership.id=membership
edc.iam.dcp.scopes.membership.type=default
edc.iam.dcp.scopes.membership.value=org.eclipse.dspace.dcp.vc.type:MembershipCredential:read
edc.iam.dcp.scopes.membership.profile=*

# Credential Service (via identity-registry)
edc.credential.service.url=http://172.17.0.1:30005/credentials/did:web:provider.dataspaces.localhost

# DID:web resolution — use HTTP (not HTTPS) within Docker network
edc.iam.did.web.use.https=false
# Demo identity fallback: accepts self-issued tokens WITHOUT signature
# verification when the DCP verifier rejects them. Development only.
# Deliberately NOT set here — the extension defaults to false, so a
# deployment that does not set DS_DEMO_IDENTITY_ENABLED=true is safe.
# Dev compose sets it explicitly; see docker-compose.provider.yml.
ds.connector.internal.url=http://172.17.0.1:30001

# ── How this EDC authenticates to ds-connector ───────────────────────────────
# A Keycloak client_credentials token, scoped to connector.internal +
# connector.webhook. This replaces X-Api-Key, which was the same value as the
# Management API key above — one secret across EDC's contract administration and
# the connector's internal API.
#
# Supplied from the environment, not written here — see the note on
# web.http.management.auth.type above for why a ${...} placeholder does not work:
#   DS_CONNECTOR_INTERNAL_TOKEN_URL      → ds.connector.internal.token.url
#   DS_CONNECTOR_INTERNAL_CLIENT_ID      → ds.connector.internal.client.id
#   DS_CONNECTOR_INTERNAL_CLIENT_SECRET  → ds.connector.internal.client.secret
# The extension refuses to start if they are missing.

# ── PostgreSQL persistence ───────────────────────────────────────────────────
edc.datasource.default.url=jdbc:postgresql://172.17.0.1:35432/edc_provider
edc.datasource.default.user=postgres
edc.datasource.default.password=postgres
edc.datasource.default.pool.maxIdleConnections=3
edc.datasource.default.pool.maxTotalConnections=10
edc.datasource.default.pool.testConnectionOnReturn=true
edc.sql.schema.autocreate=true
