edc.participant.id=did:web:consumer.dataspaces.localhost
edc.iam.issuer.id=did:web:consumer.dataspaces.localhost
edc.dsp.callback.address=http://172.17.0.1:29194/protocol
web.http.port=29191
web.http.path=/api
web.http.management.port=29193
web.http.management.path=/management
web.http.management.auth.key=${EDC_API_KEY}
web.http.protocol.port=29194
web.http.protocol.path=/protocol
web.http.public.port=29291
web.http.public.path=/public
web.http.control.port=29192
web.http.control.path=/control
web.http.version.port=29195
web.http.version.path=/version
edc.hostname=172.17.0.1
edc.dataplane.api.public.baseurl=http://172.17.0.1:29291/public
ds.edr.endpoint.public.baseurl=http://localhost:30002
edc.transfer.proxy.token.signer.privatekey.alias=participant-private-key
edc.transfer.proxy.token.verifier.publickey.alias=participant-private-key
edc.receiver.http.endpoint=${EDC_RECEIVER_HTTP_ENDPOINT}

# ── DCP / Verifiable Credentials (Iteration 5) ───────────────────────────────
edc.vault.hashicorp.enabled=false
edc.vault.fs.file=/config/consumer-vault.properties

edc.iam.sts.oauth.token.url=http://172.17.0.1:30005/sts/did:web:consumer.dataspaces.localhost/token
edc.iam.sts.oauth.client.id=did:web:consumer.dataspaces.localhost
edc.iam.sts.oauth.client.secret.alias=sts-consumer-client-secret

edc.iam.trusted-issuer.0.id=did:web:trust-anchor.dataspaces.localhost

# DCP scope used by DSP requests to ask the counterparty wallet for membership VCs.
edc.iam.dcp.scopes.membership.id=membership
edc.iam.dcp.scopes.membership.type=default
edc.iam.dcp.scopes.membership.value=org.eclipse.dspace.dcp.vc.type:MembershipCredential:read
edc.iam.dcp.scopes.membership.profile=*

edc.credential.service.url=http://172.17.0.1:30005/credentials/did:web:consumer.dataspaces.localhost

edc.iam.did.web.use.https=false
# Demo identity fallback: accepts self-issued tokens WITHOUT signature
# verification when the DCP verifier rejects them. Development only.
# Deliberately NOT set here — the extension defaults to false, so a
# deployment that does not set DS_DEMO_IDENTITY_ENABLED=true is safe.
# Dev compose sets it explicitly; see docker-compose.provider.yml.
ds.connector.internal.url=http://172.17.0.1:31001

# ── PostgreSQL persistence ───────────────────────────────────────────────────
edc.datasource.default.url=jdbc:postgresql://172.17.0.1:35432/edc_consumer
edc.datasource.default.user=postgres
edc.datasource.default.password=postgres
edc.datasource.default.pool.maxIdleConnections=3
edc.datasource.default.pool.maxTotalConnections=10
edc.datasource.default.pool.testConnectionOnReturn=true
edc.sql.schema.autocreate=true
