# Build context for all images is the repo root (../../ from this file).
# Shared postgres and caddy must be running (docker compose up -d from repo root).

networks:
  dataspaces:
    name: dataspaces
    external: true

services:
  # ── EDC connectors (DCP-enabled) ─────────────────────────────────────────────
  edc-provider:
    build:
      context: ../..
      dockerfile: services/edc-connector/Dockerfile
    image: ds-edc-connector:local
    command: ["-Dedc.fs.config=/config/provider.properties", "-jar", "/connector.jar"]
    volumes:
      - ./config:/config:ro
      - ./governance:/governance:ro
    ports:
      - "19193:19193"
      - "19194:19194"
      - "19291:19291"
      - "19195:19195"
    environment:
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19195/version/api || exit 1"]
      interval: 10s
      retries: 15
    networks: [dataspaces]

  edc-consumer:
    build:
      context: ../..
      dockerfile: services/edc-connector/Dockerfile
    image: ds-edc-connector:local
    command: ["-Dedc.fs.config=/config/consumer.properties", "-jar", "/connector.jar"]
    volumes:
      - ./config:/config:ro
      - ./governance:/governance:ro
    ports:
      - "29193:29193"
      - "29194:29194"
      - "29291:29291"
      - "29195:29195"
    environment:
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:29195/version/api || exit 1"]
      interval: 10s
      retries: 15
    networks: [dataspaces]

  # ── STS instances ─────────────────────────────────────────────────────────────
  sts-provider:
    build:
      context: ../..
      dockerfile: services/sts/Dockerfile
    image: ds-sts:local
    ports: ["38080:8080"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      STS_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      STS_PRIVATE_KEY_PATH: /config/provider-key.json
      STS_CLIENT_ID: did:web:provider.dataspaces.localhost
      STS_CLIENT_SECRET: ${STS_PROVIDER_SECRET:-insecure-dev-secret}
    volumes:
      - ./config:/config:ro
    networks: [dataspaces]

  sts-consumer:
    build:
      context: ../..
      dockerfile: services/sts/Dockerfile
    image: ds-sts:local
    ports: ["38081:8080"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      STS_PARTICIPANT_DID: did:web:consumer.dataspaces.localhost
      STS_PRIVATE_KEY_PATH: /config/consumer-key.json
      STS_CLIENT_ID: did:web:consumer.dataspaces.localhost
      STS_CLIENT_SECRET: ${STS_CONSUMER_SECRET:-insecure-dev-secret}
    volumes:
      - ./config:/config:ro
    networks: [dataspaces]

  # ── VC wallet instances ────────────────────────────────────────────────────────
  vc-wallet-provider:
    build:
      context: ../..
      dockerfile: services/vc-wallet/Dockerfile
    image: ds-vc-wallet:local
    ports: ["38082:8081"]
    environment:
      VC_WALLET_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      VC_WALLET_CREDENTIALS_PATH: /credentials/provider
    volumes:
      - ../../data/credentials:/credentials:ro
    networks: [dataspaces]

  vc-wallet-consumer:
    build:
      context: ../..
      dockerfile: services/vc-wallet/Dockerfile
    image: ds-vc-wallet:local
    ports: ["38083:8081"]
    environment:
      VC_WALLET_PARTICIPANT_DID: did:web:consumer.dataspaces.localhost
      VC_WALLET_CREDENTIALS_PATH: /credentials/consumer
    volumes:
      - ../../data/credentials:/credentials:ro
    networks: [dataspaces]

  # ── DB init — runs alembic migrations, restarts until postgres is ready ───────
  connector-db-init:
    build:
      context: ../..
      dockerfile: services/connector/Dockerfile
    image: ds-connector:local
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: on-failure
    environment:
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector
    networks: [dataspaces]

  # ── ds-connector (Python orchestration) ──────────────────────────────────────
  ds-connector:
    build:
      context: ../..
      dockerfile: services/connector/Dockerfile
    image: ds-connector:local
    ports: ["30001:30001"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      EDC_PROVIDER_MANAGEMENT_URL: http://edc-provider:19193/management
      EDC_PROVIDER_PROTOCOL_URL: http://edc-provider:19194/protocol
      EDC_CONSUMER_MANAGEMENT_URL: http://edc-consumer:29193/management
      EDC_CONSUMER_PROTOCOL_URL: http://edc-consumer:29194/protocol
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      CONNECTOR_PARTICIPANT_ID: provider
      CONNECTOR_PARTICIPANT_BASE_URL: https://provider.dataspaces.localhost
      CONNECTOR_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      CONNECTOR_DATASET_API_URL: http://dataset-api:30002
      CONNECTOR_PROVENANCE_URL: http://ds-provenance:30000
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector
      CONNECTOR_PARTICIPANTS_REGISTRY_PATH: /governance/participants.yaml
      CONNECTOR_GOVERNANCE_YAML_PATH: /governance/governance.yaml
    depends_on:
      edc-provider:
        condition: service_healthy
      edc-consumer:
        condition: service_healthy
      connector-db-init:
        condition: service_completed_successfully
    volumes:
      - ./governance:/governance:ro
    networks: [dataspaces]

  # ── Federated catalog ─────────────────────────────────────────────────────────
  ds-federated-catalog:
    build:
      context: ../..
      dockerfile: services/federated-catalog/Dockerfile
    image: ds-federated-catalog:local
    ports: ["30003:30003"]
    env_file:
      - path: ../../.env
        required: false
    environment:
      CATALOG_CONNECTOR_URL: http://ds-connector:30001
      CATALOG_PARTICIPANTS_YAML: /governance/participants.yaml
      CATALOG_CRAWL_INTERVAL: "300"
      CATALOG_STARTUP_DELAY: "15"
      CATALOG_BASE_URL: https://federated-catalog.dataspaces.localhost
    volumes:
      - ./governance:/governance:ro
    depends_on: [ds-connector]
    networks: [dataspaces]
