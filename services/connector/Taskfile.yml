version: "3"

vars:
  SRC: src/connector

tasks:
  setup:
    desc: Install Python dependencies (idempotent)
    cmds:
      - uv sync --extra dev
    sources: [pyproject.toml]
    generates: [.venv/bin/uvicorn]

  run:
    desc: Run dev server with hot-reload on :30001
    deps: [setup]
    cmds:
      - uv run uvicorn connector.main:app --reload --port 30001

  debug:
    desc: Run dev server with debugpy on :30901, waiting for attach
    deps: [setup]
    cmds:
      - uv run python -m debugpy --listen 0.0.0.0:30901 --wait-for-client -m uvicorn connector.main:app --reload --port 30001

  release:
    desc: (noop — managed by CI/CD)
    cmds:
      - echo "release not configured"

  db:migrate:
    desc: Apply pending migrations (requires postgres)
    cmds:
      - uv run alembic upgrade head

  db:revision:
    desc: "Generate a new migration — pass MESSAGE=my_description"
    cmds:
      - uv run alembic revision --autogenerate -m "{{.MESSAGE | default "migration"}}"

  test:
    cmds:
      - uv run pytest tests/ -v --cov={{.SRC}} --cov-report=term-missing

  lint:
    cmds:
      - uv run ruff check {{.SRC}} tests/

  format:
    cmds:
      - uv run ruff format {{.SRC}} tests/

  type-check:
    cmds:
      - uv run mypy {{.SRC}}
