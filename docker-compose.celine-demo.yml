networks:
  dataspaces:
    name: dataspaces
    external: true

services:
  connector-db-create:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'connector'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE connector"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    networks: [dataspaces]

  connector-db-init:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      connector-db-create:
        condition: service_completed_successfully
    environment:
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector
    networks: [dataspaces]

  ds-connector:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    ports:
      - "30001:30001"
    environment:
      EDC_PROVIDER_MANAGEMENT_URL: http://edc-provider:19193/management
      EDC_PROVIDER_PROTOCOL_URL: http://edc-provider:19194/protocol
      EDC_CONSUMER_MANAGEMENT_URL: http://edc-consumer:29193/management
      EDC_CONSUMER_PROTOCOL_URL: http://edc-consumer:29194/protocol
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      CONNECTOR_PARTICIPANT_ID: provider
      CONNECTOR_PARTICIPANT_BASE_URL: https://provider.dataspaces.localhost
      CONNECTOR_PARTICIPANT_DID: did:web:provider.dataspaces.localhost
      CONNECTOR_DATASET_API_URL: http://dataset-api:30002
      CONNECTOR_PROVENANCE_URL: http://host.docker.internal:39999
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/connector
      CONNECTOR_PARTICIPANTS_REGISTRY_PATH: /governance/participants.yaml
      CONNECTOR_GOVERNANCE_YAML_PATH: /governance/governance.yaml
    depends_on:
      connector-db-init:
        condition: service_completed_successfully
    volumes:
      - ./services/connector/governance:/governance:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  dataset-api:
    build:
      context: .
      dockerfile: services/dataset-api-mock/Dockerfile
    ports:
      - "30002:30002"
    environment:
      DATASET_API_CONNECTOR_INTERNAL_URL: http://ds-connector:30001
      DATASET_API_CELINE_URL: http://host.docker.internal:8001
      DATASET_API_ENFORCE_CONSENT: "true"
    depends_on:
      ds-connector:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  ds-portal:
    build:
      context: .
      dockerfile: services/portal/Dockerfile
    ports:
      - "30004:30004"
    environment:
      CONNECTOR_URL: http://ds-connector:30001
      DATASET_API_URL: http://dataset-api:30002
      CATALOGUE_URL: http://host.docker.internal:8001
      FEDERATED_CATALOG_URL: ""
      PROVENANCE_URL: http://host.docker.internal:39999
      DEMO_CONSUMER_ID: did:web:consumer.dataspaces.localhost
      DEMO_DATASET_ID: datasets.celine.folgaria_weather_hourly
      DEMO_SUBJECT_ID: ah-00003
      ORIGIN: http://localhost:30004
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env or CELINE_ENV_FILE}
      AUTH_URL: http://localhost:30004
      NEXTAUTH_URL: http://localhost:30004
      AUTH_TRUST_HOST: "true"
      AUTH_KEYCLOAK_ID: ${CELINE_OIDC_CLIENT_ID:?Set CELINE_OIDC_CLIENT_ID in .env or CELINE_ENV_FILE}
      AUTH_KEYCLOAK_SECRET: ${CELINE_OIDC_CLIENT_SECRET:?Set CELINE_OIDC_CLIENT_SECRET in .env or CELINE_ENV_FILE}
      AUTH_KEYCLOAK_ISSUER: ${CELINE_OIDC_BASE_URL:?Set CELINE_OIDC_BASE_URL in .env or CELINE_ENV_FILE}
      AUTH_KEYCLOAK_SCOPE: openid profile email dataset.query dataset.read groups organization
      KEYCLOAK_CLIENT_ID: ${CELINE_OIDC_CLIENT_ID:?Set CELINE_OIDC_CLIENT_ID in .env or CELINE_ENV_FILE}
    depends_on:
      dataset-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
    networks: [dataspaces]
