site_name: Dataspaces
site_description: DSSC Blueprint-aligned dataspace platform for energy communities
repo_url: https://github.com/spindoxlabs/ds
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Sections stay collapsible and collapsed by default — the blueprint trees
    # are long enough that expanding them buries everything else.
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.action.edit

plugins:
  - search
  - awesome-pages

validation:
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: info
    not_found: info

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
