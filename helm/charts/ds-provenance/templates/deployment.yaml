apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ds.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ds.labels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "ds.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "ds.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- include "ds.podSecurityContext" . | nindent 8 }}
      initContainers:
        {{- if .Values.migration.enabled }}
        - name: migrate
          image: {{ include "ds.image" . }}
          imagePullPolicy: {{ include "ds.imagePullPolicy" . }}
          workingDir: /app
          command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
          env:
            {{- include "prov.env" . | nindent 12 }}
          securityContext:
            {{- include "ds.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            {{- include "ds.tmpVolumeMount" . | nindent 12 }}
          resources:
            {{- toYaml (.Values.resources | default ((.Values.global).resources)) | nindent 12 }}
        {{- end }}
      containers:
        - name: provenance
          image: {{ include "ds.image" . }}
          imagePullPolicy: {{ include "ds.imagePullPolicy" . }}
          command: ["uvicorn", "provenance.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.service.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- include "prov.env" . | nindent 12 }}
          {{- include "ds.probes" . | nindent 10 }}
          securityContext:
            {{- include "ds.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            {{- include "ds.tmpVolumeMount" . | nindent 12 }}
          {{- include "ds.resources" . | nindent 10 }}
      volumes:
        {{- include "ds.tmpVolume" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
