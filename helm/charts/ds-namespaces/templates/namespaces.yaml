apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.authorityNamespace }}
  labels:
    app.kubernetes.io/part-of: dataspace
    dataspace.spindoxlabs.io/role: authority
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
{{- range .Values.participantNamespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    app.kubernetes.io/part-of: dataspace
    # The selector the authority-registry and EDC cross-namespace policies match.
    dataspace.spindoxlabs.io/participant: "true"
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
{{- end }}
