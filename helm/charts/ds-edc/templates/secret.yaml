{{- if eq (include "ds.createSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Consumed as env for ${...} substitution in edc.properties.
  EDC_API_KEY: {{ required "secrets.edcApiKey is required" .Values.secrets.edcApiKey | quote }}
  EDC_DB_USER: {{ .Values.secrets.dbUser | default (include "ds.db.edc" .) | quote }}
  EDC_DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  # The EDC filesystem vault, rendered from generated key material. Referenced
  # by alias from edc.properties. The committed dev fixture with its published
  # key and `insecure-dev-secret` is never mounted.
  vault.properties: |
    sts-client-secret={{ required "secrets.stsClientSecret is required" .Values.secrets.stsClientSecret }}
    participant-private-key={{ required "secrets.edrSigningPrivateJwk is required" .Values.secrets.edrSigningPrivateJwk }}
{{- end }}
