{{- if eq (include "ds.createSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Auth.js session encryption. A known value = forgeable portal sessions
  # carrying arbitrary user identity and VC claims.
  AUTH_SECRET: {{ required "secrets.authSecret is required" .Values.secrets.authSecret | quote }}
  AUTH_KEYCLOAK_SECRET: {{ required "secrets.authKeycloakSecret is required" .Values.secrets.authKeycloakSecret | quote }}
  PORTAL_SERVICE_CLIENT_SECRET: {{ required "secrets.portalServiceClientSecret is required" .Values.secrets.portalServiceClientSecret | quote }}
{{- end }}
