{{- if eq (include "ds.createSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.secrets.dbUser | default (include "ds.db.connector" .) | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  # Shared with this participant's ds-edc; also the /internal X-Api-Key.
  EDC_API_KEY: {{ required "secrets.edcApiKey is required" .Values.secrets.edcApiKey | quote }}
  CONNECTOR_SERVICE_CLIENT_SECRET: {{ required "secrets.serviceClientSecret is required" .Values.secrets.serviceClientSecret | quote }}
  # Public JWK — verifies user VCs on the consent and consumer APIs. Leaving it
  # empty in production disables the data-subject sovereignty control.
  TRUST_ANCHOR_PUBLIC_JWK: {{ required "secrets.trustAnchorPublicJwk is required" .Values.secrets.trustAnchorPublicJwk | quote }}
{{- end }}
