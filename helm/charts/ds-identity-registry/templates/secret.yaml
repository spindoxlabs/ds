{{- if eq (include "ds.createSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Fernet passphrase for every participant DID private key at rest.
  # LOSS makes them unrecoverable — this Secret is not a backup, keep a copy in
  # a backed-up secret store outside the cluster.
  IDENTITY_REGISTRY_ENCRYPTION_KEY: {{ required "secrets.identityRegistryEncryptionKey is required" .Values.secrets.identityRegistryEncryptionKey | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ required "secrets.keycloakClientSecret is required" .Values.secrets.keycloakClientSecret | quote }}
  DB_USER: {{ .Values.secrets.dbUser | default (((.Values.global).postgres).databases).identityRegistry | quote }}
  DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  {{- if .Values.keycloak.sync.enabled }}
  KEYCLOAK_ADMIN_USERNAME: {{ required "keycloak.sync.enabled requires secrets.keycloakAdminUsername" .Values.secrets.keycloakAdminUsername | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ required "keycloak.sync.enabled requires secrets.keycloakAdminPassword" .Values.secrets.keycloakAdminPassword | quote }}
  {{- end }}
{{- end }}
