apiVersion: v1
kind: Service
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  # ClusterIP always. The public surface is the path-scoped Ingress in
  # ingress.yaml — /admin, /sts, /credentials, /memberships and /owners are
  # never reachable from outside the cluster.
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ds.selectorLabels" . | nindent 4 }}
