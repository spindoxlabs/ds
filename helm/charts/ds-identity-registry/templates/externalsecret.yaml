{{- if and ((.Values.global).externalSecrets).enabled (not .Values.existingSecret) }}
# When External Secrets Operator is in use the chart declares WHICH keys it
# needs and where they live, but never carries their values.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ ((.Values.global).externalSecrets).refreshInterval | default "1h" }}
  secretStoreRef:
    {{- toYaml ((.Values.global).externalSecrets).secretStoreRef | nindent 4 }}
  target:
    name: {{ include "ds.fullname" . }}
    creationPolicy: Owner
  data:
    {{- $prefix := ((.Values.global).externalSecrets).remotePrefix | default "dataspace" }}
    - secretKey: IDENTITY_REGISTRY_ENCRYPTION_KEY
      remoteRef:
        key: {{ $prefix }}/identity-registry
        property: encryption_key
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: {{ $prefix }}/identity-registry
        property: keycloak_client_secret
    - secretKey: DB_USER
      remoteRef:
        key: {{ $prefix }}/identity-registry
        property: db_user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ $prefix }}/identity-registry
        property: db_password
    {{- if .Values.keycloak.sync.enabled }}
    - secretKey: KEYCLOAK_ADMIN_USERNAME
      remoteRef:
        key: {{ $prefix }}/keycloak
        property: admin_username
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: {{ $prefix }}/keycloak
        property: admin_password
    {{- end }}
{{- end }}
