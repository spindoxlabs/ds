{{- if ((.Values.global).networkPolicy).enabled }}
{{ include "ds.networkPolicy.defaultDeny" . }}
---
# The public paths (/dids, /status) arrive through the ingress controller.
{{ include "ds.networkPolicy.fromIngressController" (dict "ctx" . "ports" (list .Values.service.port)) }}
---
# In-cluster callers: every participant namespace reaches the registry for STS
# token issuance, VP queries, participant/owner resolution and membership
# checks. Restricted by namespace label, not open to the whole cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ds.fullname" . }}-from-participants
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ds.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              dataspace.spindoxlabs.io/participant: "true"
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
---
# Egress: Keycloak over TLS. The registry verifies every JWT against the JWKS
# endpoint, so without this rule the default-deny baseline (DNS + Postgres only)
# fails every authenticated request. The optional keycloak-org-sync init
# container needs the same rule to reach the admin API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ds.fullname" . }}-egress
  labels:
    {{- include "ds.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ds.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32 # cloud metadata endpoint
      ports:
        - {protocol: TCP, port: 443}
{{- end }}
