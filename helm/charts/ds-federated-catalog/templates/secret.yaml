{{- if eq (include "ds.createSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ds.fullname" . }}
  labels:
    {{- include "ds.labels" . | nindent 4 }}
type: Opaque
stringData:
  CATALOG_SERVICE_CLIENT_SECRET: {{ required "secrets.serviceClientSecret is required" .Values.secrets.serviceClientSecret | quote }}
{{- end }}
