# ==============================================================================
# Secret values — template for secrets.sops.yaml
# ==============================================================================
#
#   cp helm/secrets.example.yaml helm/secrets.sops.yaml
#   sops --encrypt --in-place helm/secrets.sops.yaml
#
# secrets.sops.yaml is encrypted at rest and safe to commit; the DECRYPTED form
# must never be. helmfile decrypts it at render time (`helmfile.yaml` →
# environments.<env>.secrets).
#
# Generation:
#   openssl rand -hex 32                                        # API keys, AUTH_SECRET
#   python -c 'import secrets;print(secrets.token_urlsafe(32))' # Fernet passphrase
#   task secrets:keygen                                         # EC P-256 key material
#
# This file mirrors .env.example 1:1. A variable documented there and missing
# here is a gap — see helm/AGENTS.md.
# ==============================================================================

secrets:
  # ── Critical: each of these is a full compromise if leaked ──────────────────

  # Fernet passphrase encrypting every participant DID private key at rest.
  # Leak → impersonate any participant. LOSS → every stored private key is
  # unrecoverable. Back this up OUTSIDE the cluster; a cluster Secret is not a
  # backup. Rotation requires re-encrypting the key table — no automatic path.
  identityRegistryEncryptionKey: CHANGE_ME

  # Auth.js session encryption for the portal. Leak → forge portal sessions
  # carrying arbitrary user identity and VC claims.
  authSecret: CHANGE_ME

  # ── Keycloak service clients (services/keycloak/clients.yaml) ───────────────
  # In dev every one of these defaults to its own client_id.
  svcDsIdentityRegistrySecret: CHANGE_ME
  svcDsOnboardingSecret: CHANGE_ME
  svcDsPortalSecret: CHANGE_ME
  svcDsConnectorSecret: CHANGE_ME
  svcDsFederatedCatalogSecret: CHANGE_ME
  svcDsDatasetApiSecret: CHANGE_ME
  svcEdcSecret: CHANGE_ME

  # Public-facing portal OIDC client (Auth.js login flow).
  authKeycloakSecret: CHANGE_ME

  # Identity-registry's own Keycloak admin client (realm/org provisioning).
  keycloakClientSecret: CHANGE_ME

  # Only needed when global.keycloak.sync.enabled — prefer provisioning the
  # realm out-of-band and leaving these unset.
  keycloakAdminUsername: ""
  keycloakAdminPassword: ""

  # ── Trust anchor ────────────────────────────────────────────────────────────
  # Public JWK from `task secrets:keygen`, verifying user VCs on the consent and
  # consumer APIs. Unset in production = the data-subject sovereignty control is
  # off. Paste the contents of secrets/trust-anchor.public.jwk.json.
  trustAnchorPublicJwk: |
    {"kty":"EC","crv":"P-256","x":"CHANGE_ME","y":"CHANGE_ME"}

  # ── Database roles (one per service, per helm/docs/cnpg-cluster.example.yaml)
  # Keys are <service>_<participant> for participant-scoped services.
  postgres:
    identity_registry: CHANGE_ME
    connector_provider: CHANGE_ME
    provenance_provider: CHANGE_ME
    edc_provider: CHANGE_ME
    connector_consumer: CHANGE_ME
    provenance_consumer: CHANGE_ME
    edc_consumer: CHANGE_ME

  # ── Per-participant material ────────────────────────────────────────────────
  # Keyed by the participant name in values.yaml.
  participants:
    provider:
      # EDC Management API key. Also the X-Api-Key accepted by ds-connector
      # /internal/*. Leak → create/delete assets and policies, read
      # consented-subject lists, forge audit events.
      edcApiKey: CHANGE_ME
      # EDC vault contents. Rendered into vault.properties and mounted.
      # The committed services/connector/config/*-vault.properties are DEV
      # FIXTURES with published keys — never mount them.
      edcVault:
        # Private JWK from `task secrets:keygen` — signs Endpoint Data
        # References. Distinct from any DID private key.
        edrSigningPrivateJwk: |
          {"kty":"EC","crv":"P-256","d":"CHANGE_ME","x":"CHANGE_ME","y":"CHANGE_ME"}
      # STS client secret registered for this participant in the registry.
      stsSecret: CHANGE_ME
    consumer:
      edcApiKey: CHANGE_ME
      edcVault:
        edrSigningPrivateJwk: |
          {"kty":"EC","crv":"P-256","d":"CHANGE_ME","x":"CHANGE_ME","y":"CHANGE_ME"}
      stsSecret: CHANGE_ME
