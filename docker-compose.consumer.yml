# Consumer participant stack.
# Requires shared infra (docker compose up -d) running first.
#
#   task consumer:start

networks:
  dataspaces:
    name: dataspaces
    external: true

services:
  # ── EDC consumer connector (Java, DCP-enabled) ──────────────────────────────
  edc-consumer:
    build:
      context: .
      dockerfile: services/edc-connector/Dockerfile
    command:
      [
        "sh",
        "-c",
        "java $$JAVA_OPTS -Dedc.fs.config=/config/consumer.properties -jar /connector.jar",
      ]
    volumes:
      - ./services/connector/config:/config:ro
    ports:
      - "29193:29193"
      - "29194:29194"
      - "29291:29291"
      - "29195:29195"
    environment:
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      EDC_RECEIVER_HTTP_ENDPOINT: http://172.17.0.1:31001/webhooks/transfer-process
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:29191/api/check/health || exit 1"]
      interval: 10s
      start_period: 60s
      retries: 15
    networks: [dataspaces]

  # ── Database init ────────────────────────────────────────────────────────────
  connector-db-create-consumer:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h 172.17.0.1 -p 35432 -U postgres; do sleep 1; done &&
      psql -h 172.17.0.1 -p 35432 -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'connector_consumer'"'"'" |
      grep -q 1 || psql -h 172.17.0.1 -p 35432 -U postgres -c "CREATE DATABASE connector_consumer"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    networks: [dataspaces]

  connector-db-init-consumer:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      connector-db-create-consumer:
        condition: service_completed_successfully
    environment:
      CONNECTOR_ROLE: consumer
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_consumer
    networks: [dataspaces]

  provenance-db-create-consumer:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h 172.17.0.1 -p 35432 -U postgres; do sleep 1; done &&
      psql -h 172.17.0.1 -p 35432 -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'provenance_consumer'"'"'" |
      grep -q 1 || psql -h 172.17.0.1 -p 35432 -U postgres -c "CREATE DATABASE provenance_consumer"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    networks: [dataspaces]

  provenance-db-init-consumer:
    build:
      context: .
      dockerfile: services/provenance/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      provenance-db-create-consumer:
        condition: service_completed_successfully
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/provenance_consumer
    networks: [dataspaces]

  # ── Consumer connector (Python orchestration) ───────────────────────────────
  ds-connector-consumer:
    build:
      context: .
      dockerfile: services/connector/Dockerfile
    command: ["uvicorn", "connector.main:app", "--host", "0.0.0.0", "--port", "31001"]
    ports:
      - "31001:31001"
    env_file:
      - path: .env.celine
        required: false
    environment:
      CONNECTOR_ROLE: consumer
      EDC_CONSUMER_MANAGEMENT_URL: http://172.17.0.1:29193/management
      EDC_CONSUMER_PROTOCOL_URL: http://172.17.0.1:29194/protocol/2025-1
      EDC_API_KEY: ${EDC_API_KEY:-insecure-dev-key}
      CONNECTOR_PARTICIPANT_ID: consumer
      CONNECTOR_PARTICIPANT_BASE_URL: https://consumer.dataspaces.localhost
      CONNECTOR_PARTICIPANT_DID: did:web:consumer.dataspaces.localhost
      CONNECTOR_CONSUMER_PARTICIPANT_DID: did:web:consumer.dataspaces.localhost
      CONNECTOR_PROVENANCE_URL: http://172.17.0.1:31000
      CONNECTOR_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_consumer
      CONNECTOR_GOVERNANCE_YAML_PATH: /governance/governance.yaml
      CONNECTOR_IDENTITY_REGISTRY_URL: http://172.17.0.1:30005
      CONNECTOR_KEYCLOAK_TOKEN_URL: http://172.17.0.1:9080/realms/dataspaces/protocol/openid-connect/token
      CONNECTOR_SERVICE_CLIENT_SECRET: ${SVC_DS_CONNECTOR_SECRET:-svc-ds-connector}
    depends_on:
      edc-consumer:
        condition: service_healthy
      connector-db-init-consumer:
        condition: service_completed_successfully
      ds-provenance-consumer:
        condition: service_healthy
    volumes:
      - ./services/connector/governance:/governance:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:31001/health', timeout=2)\""]
      interval: 10s
      start_period: 20s
      retries: 10
    networks: [dataspaces]

  # ── Consumer provenance ──────────────────────────────────────────────────────
  ds-provenance-consumer:
    build:
      context: .
      dockerfile: services/provenance/Dockerfile
    command: ["uvicorn", "provenance.main:app", "--host", "0.0.0.0", "--port", "31000"]
    ports:
      - "31000:31000"
    environment:
      PROVENANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/provenance_consumer
    depends_on:
      provenance-db-init-consumer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:31000/health', timeout=2)\""]
      interval: 10s
      start_period: 10s
      retries: 10
    networks: [dataspaces]
