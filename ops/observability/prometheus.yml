global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ds-connector
    metrics_path: /metrics
    static_configs:
      - targets: ["ds-connector:30001"]

  - job_name: ds-provenance
    metrics_path: /metrics
    static_configs:
      - targets: ["ds-provenance:30000"]

  - job_name: dataset-api
    metrics_path: /metrics
    static_configs:
      - targets: ["dataset-api:30002"]

  - job_name: ds-portal
    metrics_path: /metrics
    static_configs:
      - targets: ["ds-portal:30004"]

  - job_name: ds-federated-catalog
    metrics_path: /metrics
    static_configs:
      - targets: ["ds-federated-catalog:30003"]

  - job_name: sts
    metrics_path: /metrics
    static_configs:
      - targets:
          - "sts-provider:8080"
          - "sts-consumer:8080"

  - job_name: vc-wallet
    metrics_path: /metrics
    static_configs:
      - targets:
          - "vc-wallet-provider:8081"
          - "vc-wallet-consumer:8081"

  - job_name: credential-status-registry
    metrics_path: /credentials/status-list.json
    static_configs:
      - targets: ["trust-anchor.dataspaces.example.org"]
    scheme: https
