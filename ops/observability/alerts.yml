groups:
  - name: dataspace-runtime
    rules:
      - alert: DataspaceServiceDown
        expr: up{job=~"ds-connector|ds-provenance|dataset-api|ds-portal|ds-federated-catalog|sts|vc-wallet"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Dataspace service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }}."

      - alert: DataspaceHighErrorRate
        expr: increase(ds_http_5xx_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx count for {{ $labels.service }}"
          description: "{{ $labels.service }} returned more than five 5xx responses in five minutes."

      - alert: CredentialStatusRegistryDown
        expr: up{job="credential-status-registry"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Credential status registry is not reachable"
          description: "VC revocation/status checks may fail or block production flows."

      - alert: NegotiationFailureSpike
        expr: increase(ds_http_5xx_total{service="ds-connector",path=~"/consumer/.*|/provider/.*"}[10m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Connector negotiation or transfer failures increased"
          description: "Connector provider/consumer endpoints returned repeated 5xx responses."
