version: "3"

# ── Root Taskfile ────────────────────────────────────────────────────────────
#
# Quick start:
#   task start
#
# All local dev defaults live in .env.local (committed).
# Override per-machine in .env (gitignored).
#
dotenv: [".env", ".env.local"]

env:
  COMPOSE_PROJECT_NAME: dataspaces

tasks:
  # ── Idempotent workspace setup ────────────────────────────────────────────
  setup:
    desc: Prepare local dev environment (installs deps in each service)
    cmds:
      - |
        for dir in services/*/; do
          if [ -f "${dir}Taskfile.yml" ]; then
            echo "→ setup ${dir}"
            task -d "${dir}" setup 2>/dev/null || true
          fi
        done

  # ── Shared infrastructure ────────────────────────────────────────────────
  keycloak:reload:
    desc: Reset keycloak and reinitialize
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose down -v keycloak
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up -d keycloak keycloak-org-sync keycloak-sync

  build:
    desc: Rebuild all Docker images (infra + provider + consumer)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose build
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml build
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml build

  infra:start:
    desc: Start shared infrastructure (postgres, caddy, identity-registry, keycloak)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up -d

  infra:stop:
    desc: Stop shared infrastructure
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose down

  # ── Identity Registry bootstrap ──────────────────────────────────────────
  identity:bootstrap:
    desc: Run identity bootstrap init container (trust anchor + participants + dev users)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up identity-registry-bootstrap

  # ── Provider participant ─────────────────────────────────────────────────
  provider:start:
    desc: Start provider participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml up -d --build
        echo "Waiting for provider connector..."
        until curl -fsS http://localhost:30001/health >/dev/null 2>&1; do sleep 2; done
        KC_URL="${KEYCLOAK_TOKEN_URL}"
        TOKEN=$(curl -fsS -X POST "$KC_URL" \
          -d grant_type=client_credentials \
          -d "client_id=${SVC_DS_PORTAL_ID}" \
          -d "client_secret=${SVC_DS_PORTAL_SECRET}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
        curl -fsS -X POST http://localhost:30001/provider/sync \
          -H "Authorization: Bearer $TOKEN" >/dev/null
        echo "Provider started — gateway http://localhost:9010 — portal: task provider:portal:run"

  provider:stop:
    desc: Stop provider participant stack
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml down

  provider:status:
    desc: Show provider container status
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml ps

  provider:logs:
    desc: Follow provider logs
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml logs -f

  # ── Consumer participant ─────────────────────────────────────────────────
  consumer:start:
    desc: Start consumer participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml up -d --build
        echo "Consumer started — gateway http://localhost:9000"

  consumer:stop:
    desc: Stop consumer participant stack
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml down

  consumer:status:
    desc: Show consumer container status
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml ps

  consumer:logs:
    desc: Follow consumer logs
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml logs -f

  # ── Full stack aliases ───────────────────────────────────────────────────
  start:
    desc: Start everything (infra + identity bootstrap + provider + consumer)
    cmds:
      - task: infra:start
      - task: identity:bootstrap
      - task: provider:start
      - task: consumer:start

  stop:
    desc: Stop everything
    cmds:
      - task: consumer:stop
      - task: provider:stop
      - task: infra:stop

  status:
    desc: Show all running containers
    cmds:
      - docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  # ── Identity registry local dev override ──────────────────────────────────
  identity-registry:run:
    desc: Stop Docker container, run identity-registry locally on :30005
    cmds:
      - docker stop dataspaces-identity-registry-1 2>/dev/null || true
      - |
        cd services/identity-registry
        uv run uvicorn identity_registry.main:app --reload --host 0.0.0.0 --port 30005

  identity-registry:debug:
    desc: Stop Docker container, debug identity-registry on :30005 (debugpy :30905)
    cmds:
      - docker stop dataspaces-identity-registry-1 2>/dev/null || true
      - |
        cd services/identity-registry
        uv run python -m debugpy --listen 0.0.0.0:30905 --wait-for-client \
          -m uvicorn identity_registry.main:app --reload --host 0.0.0.0 --port 30005

  # ── Provider local dev overrides ─────────────────────────────────────────
  provider:connector:run:
    desc: Stop Docker container, run provider connector locally on :30001
    cmds:
      - docker stop dataspaces-ds-connector-provider-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=provider \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_PROVIDER \
        uv run uvicorn connector.main:app --reload --host 0.0.0.0 --port 30001

  provider:connector:debug:
    desc: Stop Docker container, debug provider connector on :30001 (debugpy :30901)
    cmds:
      - docker stop dataspaces-ds-connector-provider-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=provider \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_PROVIDER \
        uv run python -m debugpy --listen 0.0.0.0:30901 --wait-for-client \
          -m uvicorn connector.main:app --reload --host 0.0.0.0 --port 30001

  provider:provenance:run:
    desc: Stop Docker container, run provider provenance locally on :30000
    cmds:
      - docker stop dataspaces-ds-provenance-provider-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=$PROVENANCE_DATABASE_URL_PROVIDER \
        uv run uvicorn provenance.main:app --reload --host 0.0.0.0 --port 30000

  provider:dataset-api:run:
    desc: Stop Docker container, run dataset-api locally on :30002
    cmds:
      - docker stop dataspaces-dataset-api-provider-1 2>/dev/null || true
      - |
        cd services/dataset-api-mock
        uv run uvicorn dataset_api_mock.main:app --reload --host 0.0.0.0 --port 30002

  provider:federated-catalog:run:
    desc: Stop Docker container, run federated-catalog locally on :30003
    cmds:
      - docker stop dataspaces-ds-federated-catalog-provider-1 2>/dev/null || true
      - |
        cd services/federated-catalog
        uv run uvicorn federated_catalog.main:app --reload --host 0.0.0.0 --port 30003

  # ── Consumer local dev overrides ─────────────────────────────────────────
  consumer:connector:run:
    desc: Stop Docker container, run consumer connector locally on :31001
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_CONSUMER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_CONSUMER \
        uv run uvicorn connector.main:app --reload --host 0.0.0.0 --port 31001

  consumer:connector:debug:
    desc: Stop Docker container, debug consumer connector on :31001 (debugpy :31901)
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_CONSUMER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_CONSUMER \
        uv run python -m debugpy --listen 0.0.0.0:31901 --wait-for-client \
          -m uvicorn connector.main:app --reload --host 0.0.0.0 --port 31001

  consumer:provenance:run:
    desc: Stop Docker container, run consumer provenance locally on :31000
    cmds:
      - docker stop dataspaces-ds-provenance-consumer-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=$PROVENANCE_DATABASE_URL_CONSUMER \
        uv run uvicorn provenance.main:app --reload --host 0.0.0.0 --port 31000

  provider:portal:run:
    desc: Stop Docker container, run portal locally on :30004
    cmds:
      - docker stop dataspaces-ds-portal-1 2>/dev/null || true
      - |
        cd services/portal
        CONNECTOR_URL=http://172.17.0.1:30001 \
        PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        FEDERATED_CATALOG_URL=http://172.17.0.1:30003 \
        IDENTITY_REGISTRY_URL=$CONNECTOR_IDENTITY_REGISTRY_URL \
        npm run dev

  # ── Dev lifecycle ─────────────────────────────────────────────────────────
  dev:stop:
    desc: Stop everything (failsafe — exits 0 even if nothing is running)
    cmds:
      - |
        set +e
        DEV_PORTS="19191 19193 19194 19291 29191 29193 29194 29291 30000 30001 30002 30003 30004 30005 31000 31001"

        # 1. Send C-c to every tmux window, wait for graceful shutdown, then kill session
        if tmux has-session -t ds 2>/dev/null; then
          for win in $(tmux list-windows -t ds -F '#W' 2>/dev/null); do
            tmux send-keys -t "ds:${win}" C-c 2>/dev/null
          done
          sleep 3
          tmux kill-session -t ds 2>/dev/null
        fi

        # 2. Kill process groups of anything on known ports
        #    Kills the watcher parent + Java child together so nothing respawns
        kill_port_holders() {
          for port in $DEV_PORTS; do
            for pid in $(lsof -ti tcp:${port} 2>/dev/null); do
              pgid=$(ps -o pgid= -p $pid 2>/dev/null | tr -d ' ')
              [ -n "$pgid" ] && kill -9 -${pgid} 2>/dev/null
              kill -9 $pid 2>/dev/null
            done
          done
        }
        kill_port_holders

        # 3. Docker compose down on all stacks
        COMPOSE_IGNORE_ORPHANS=true docker compose --env-file .env.local -f docker-compose.consumer.yml down -v --remove-orphans 2>/dev/null
        COMPOSE_IGNORE_ORPHANS=true docker compose --env-file .env.local -f docker-compose.provider.yml down -v --remove-orphans 2>/dev/null
        COMPOSE_PROJECT_NAME=dataspaces docker compose down -v --remove-orphans 2>/dev/null

        # 4. Final sweep
        kill_port_holders

        # 5. Wait for ports to be free
        for port in $DEV_PORTS; do
          timeout 5 bash -c "while lsof -ti tcp:${port} >/dev/null 2>&1; do sleep 0.3; done" 2>/dev/null
        done

        echo "All stopped"
        exit 0

  dev:start:
    desc: Build images, then start everything (infra + bootstrap + provider + consumer)
    cmds:
      - task: build
      - task: start

  dev:restart:
    desc: Full restart (stop + start)
    cmds:
      - task: dev:stop
      - task: dev:start

  dev:
    desc: Restart all services, then open tmux shells
    cmds:
      - |
        command -v tmux >/dev/null 2>&1 || {
          echo "tmux is not installed. Install it, e.g.:  sudo apt install tmux" >&2
          exit 1
        }
      - task: dev:stop
      - task: dev:start
      - |
        tmux new-session -d -s ds -n edc-watch-build
        tmux source-file "$(pwd)/dev.tmux.conf"
        tmux send-keys -t ds:edc-watch-build          'task edc:watch-build' Enter
        tmux new-window -t ds -n edc-provider
        tmux send-keys -t ds:edc-provider             'task edc-provider:watch' Enter
        tmux new-window -t ds -n edc-consumer
        tmux send-keys -t ds:edc-consumer             'task edc-consumer:watch' Enter
        tmux new-window -t ds -n identity-registry
        tmux send-keys -t ds:identity-registry        'task identity-registry:run' Enter
        tmux new-window -t ds -n provider-connector
        tmux send-keys -t ds:provider-connector       'task provider:connector:run' Enter
        tmux new-window -t ds -n provider-provenance
        tmux send-keys -t ds:provider-provenance      'task provider:provenance:run' Enter
        tmux new-window -t ds -n provider-dataset-api
        tmux send-keys -t ds:provider-dataset-api     'task provider:dataset-api:run' Enter
        tmux new-window -t ds -n provider-fed-catalog
        tmux send-keys -t ds:provider-fed-catalog     'task provider:federated-catalog:run' Enter
        tmux new-window -t ds -n provider-portal
        tmux send-keys -t ds:provider-portal          'task provider:portal:run' Enter
        tmux new-window -t ds -n consumer-connector
        tmux send-keys -t ds:consumer-connector       'task consumer:connector:run' Enter
        tmux new-window -t ds -n consumer-provenance
        tmux send-keys -t ds:consumer-provenance      'task consumer:provenance:run' Enter
        tmux attach -t ds

  # ── Utilities ────────────────────────────────────────────────────────────

  reset-demo-state:
    desc: Clear runtime requests, consents, agreements, transfers and provenance events
    cmds:
      - |
        set -euo pipefail
        compose() {
          COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true docker compose "$@"
        }
        for db in connector_provider connector_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              consumer_access_requests,
              consumer_transfers,
              contract_agreements,
              consent_requests
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        for db in provenance_provider provenance_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              domain_events,
              prov_relations,
              prov_nodes,
              access_log
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        for db in edc_provider edc_consumer; do
          compose exec -T postgres psql -U postgres -v ON_ERROR_STOP=1 -c "
            DROP DATABASE IF EXISTS $db;
            CREATE DATABASE $db;
          " 2>/dev/null || true
        done
        KC_URL="${KEYCLOAK_TOKEN_URL}"
        TOKEN=$(curl -fsS -X POST "$KC_URL" \
          -d grant_type=client_credentials \
          -d "client_id=${SVC_DS_PORTAL_ID}" \
          -d "client_secret=${SVC_DS_PORTAL_SECRET}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null) || true
        curl -fsS -X POST http://localhost:30001/provider/sync \
          -H "Authorization: Bearer $TOKEN" >/dev/null 2>&1 || true
        echo "Demo state cleared"

  # ── EDC build ────────────────────────────────────────────────────────────
  edc:base:
    desc: Build EDC base image with cached deps (run once per version bump)
    cmds:
      - docker build -f services/edc-connector/Dockerfile.base -t ds-edc-base:0.16.0 .

  edc:ensure-base:
    desc: Build EDC base image only when missing
    cmds:
      - docker image inspect ds-edc-base:0.16.0 >/dev/null 2>&1 || task edc:base

  edc:build:
    desc: Build EDC connector fat JAR via Docker (caches in data/gradle)
    cmds:
      - mkdir -p data/gradle
      - >-
        docker run --rm
        -v "{{.ROOT_DIR}}:/project"
        -v "{{.ROOT_DIR}}/data/gradle:/home/gradle/.gradle"
        -w /project
        gradle:8.12-jdk21
        gradle :edc-connector:shadowJar --no-daemon

  edc:docker:
    desc: Build EDC connector Docker image (requires ds-edc-base:0.16.0)
    cmds:
      - docker build -f services/edc-connector/Dockerfile -t ds-edc-connector:local .

  edc:restart:
    desc: Rebuild EDC fat JAR + Docker image and force-recreate both EDC containers
    deps: [edc:ensure-base]
    cmds:
      - task: edc:build
      - task: edc:docker
      - |
        docker stop dataspaces-edc-provider-1 dataspaces-edc-consumer-1 2>/dev/null || true
        docker rm -f dataspaces-edc-provider-1 dataspaces-edc-consumer-1 2>/dev/null || true
        fuser -k 19193/tcp 19194/tcp 19195/tcp 19291/tcp 29193/tcp 29194/tcp 29195/tcp 29291/tcp 2>/dev/null || true
        sleep 1
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml up -d --build --force-recreate --no-deps edc-provider
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml up -d --build --force-recreate --no-deps edc-consumer
        echo "Waiting for EDC provider (timeout 90s)..."
        timeout 90 bash -c 'until docker inspect dataspaces-edc-provider-1 --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 3; done' \
          && echo "EDC provider ready" || echo "EDC provider failed to start"
        echo "Waiting for EDC consumer (timeout 90s)..."
        timeout 90 bash -c 'until docker inspect dataspaces-edc-consumer-1 --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 3; done' \
          && echo "EDC consumer ready" || echo "EDC consumer failed to start"

  # ── EDC local dev overrides ─────────────────────────────────────────────
  edc-provider:run:
    desc: Stop Docker container, run EDC provider locally from fat JAR
    cmds:
      - docker stop dataspaces-edc-provider-1 2>/dev/null || true
      - |
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_PROVIDER" \
        exec java -Xms256m -Xmx512m \
          -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/provider.properties \
          -Dedc.vault.fs.file={{.ROOT_DIR}}/services/connector/config/provider-vault.properties \
          -Dds.demo.identity.enabled=true \
          -jar "$jar"

  edc-consumer:run:
    desc: Stop Docker container, run EDC consumer locally from fat JAR
    cmds:
      - docker stop dataspaces-edc-consumer-1 2>/dev/null || true
      - |
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_CONSUMER" \
        exec java -Xms256m -Xmx512m \
          -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/consumer.properties \
          -Dedc.vault.fs.file={{.ROOT_DIR}}/services/connector/config/consumer-vault.properties \
          -Dds.demo.identity.enabled=true \
          -jar "$jar"

  edc:watch-build:
    desc: Continuously rebuild EDC fat JAR on source changes (Gradle --continuous)
    cmds:
      - mkdir -p data/gradle
      - >-
        docker run --rm -it
        --init
        -v "{{.ROOT_DIR}}:/project"
        -v "{{.ROOT_DIR}}/data/gradle:/home/gradle/.gradle"
        -w /project
        gradle:8.12-jdk21
        gradle :edc-connector:shadowJar --continuous --no-daemon

  edc-provider:watch:
    desc: Run EDC provider locally, auto-restart on fat JAR rebuild
    cmds:
      - docker stop dataspaces-edc-provider-1 2>/dev/null || true
      - |
        set +e
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        PID=
        cleanup() { [ -n "$PID" ] && kill $PID 2>/dev/null && wait $PID 2>/dev/null; exit 0; }
        trap cleanup INT TERM EXIT
        while true; do
          MTIME=$(stat -c %Y "$jar")
          echo "Starting EDC provider (JAR mtime: $MTIME)..."
          EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_PROVIDER" \
          java -Xms256m -Xmx512m \
            -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/provider.properties \
            -Dedc.vault.fs.file={{.ROOT_DIR}}/services/connector/config/provider-vault.properties \
            -Dds.demo.identity.enabled=true \
            -jar "$jar" &
          PID=$!
          while [ "$(stat -c %Y "$jar" 2>/dev/null)" = "$MTIME" ]; do
            sleep 2
            kill -0 $PID 2>/dev/null || break
          done
          echo "JAR changed or process exited — restarting..."
          kill $PID 2>/dev/null; wait $PID 2>/dev/null
          PID=
          sleep 1
        done

  edc-consumer:watch:
    desc: Run EDC consumer locally, auto-restart on fat JAR rebuild
    cmds:
      - docker stop dataspaces-edc-consumer-1 2>/dev/null || true
      - |
        set +e
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        PID=
        cleanup() { [ -n "$PID" ] && kill $PID 2>/dev/null && wait $PID 2>/dev/null; exit 0; }
        trap cleanup INT TERM EXIT
        while true; do
          MTIME=$(stat -c %Y "$jar")
          echo "Starting EDC consumer (JAR mtime: $MTIME)..."
          EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_CONSUMER" \
          java -Xms256m -Xmx512m \
            -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/consumer.properties \
            -Dedc.vault.fs.file={{.ROOT_DIR}}/services/connector/config/consumer-vault.properties \
            -Dds.demo.identity.enabled=true \
            -jar "$jar" &
          PID=$!
          while [ "$(stat -c %Y "$jar" 2>/dev/null)" = "$MTIME" ]; do
            sleep 2
            kill -0 $PID 2>/dev/null || break
          done
          echo "JAR changed or process exited — restarting..."
          kill $PID 2>/dev/null; wait $PID 2>/dev/null
          PID=
          sleep 1
        done

  # ── Schema ───────────────────────────────────────────────────────────────
  #
  # Alembic owns every schema. Services verify the revision at startup and
  # refuse to run against one they did not expect, so these tasks are the only
  # way a database changes shape.

  db:migrate:
    desc: Apply pending migrations to every service database
    cmds:
      - task: db:migrate:identity-registry
      - task: db:migrate:connector
      - task: db:migrate:provenance

  db:migrate:identity-registry:
    desc: Migrate the identity-registry database
    cmds:
      - |
        cd services/identity-registry
        IDENTITY_REGISTRY_DATABASE_URL="{{.IR_DB | default "postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/identity_registry"}}" \
          uv run alembic upgrade head

  db:migrate:connector:
    desc: Migrate both connector databases (provider + consumer)
    cmds:
      - |
        cd services/connector
        for db in connector_provider connector_consumer; do
          echo "→ $db"
          CONNECTOR_ROLE=provider \
          CONNECTOR_DATABASE_URL="postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/$db" \
            uv run alembic upgrade head
        done

  db:migrate:provenance:
    desc: Migrate both provenance databases (provider + consumer)
    cmds:
      - |
        cd services/provenance
        for db in provenance_provider provenance_consumer; do
          echo "→ $db"
          PROVENANCE_DATABASE_URL="postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/$db" \
            uv run alembic upgrade head
        done

  db:status:
    desc: Report the schema revision of every service database
    cmds:
      - |
        for db in identity_registry connector_provider connector_consumer \
                  provenance_provider provenance_consumer; do
          rev=$(docker exec dataspaces-postgres-1 psql -U postgres -d "$db" -tAc \
            "select version_num from alembic_version" 2>/dev/null || echo "MISSING")
          printf '  %-24s %s\n' "$db" "${rev:-<no revision>}"
        done

  db:reset:
    desc: "DESTRUCTIVE: drop every service database and rebuild it from migrations"
    prompt: This deletes all local dataspace data. Continue?
    cmds:
      - |
        for db in identity_registry connector_provider connector_consumer \
                  provenance_provider provenance_consumer edc_provider edc_consumer; do
          echo "→ dropping $db"
          docker exec dataspaces-postgres-1 psql -U postgres -d postgres -q \
            -c "DROP DATABASE IF EXISTS $db WITH (FORCE)" \
            -c "CREATE DATABASE $db"
        done
      - task: db:migrate
      - |
        echo
        echo "Databases rebuilt at head. Next:"
        echo "  1. task identity:bootstrap    (trust anchor, participants, dev users)"
        echo "  2. restart ds-connector, identity-registry and ds-provenance —"
        echo "     they verify the schema revision at startup and hold stale connections"
        echo "  3. task e2e:scenario:apply    (use-case fixtures, if you run the chains)"

  # ── E2E verification ─────────────────────────────────────────────────────
  e2e:
    desc: Run E2E smoke test
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow smoke

  e2e:clean:
    desc: Reset runtime state for clean E2E run
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e clean

  e2e:all:
    desc: Run all E2E flows with cleanup
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow all --clean-first

  e2e:uc1:
    desc: "E2E: UC-1 delegated consent"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc1

  e2e:uc2:
    desc: "E2E: UC-2+UC-3 owner-scoped negotiation"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc2

  e2e:uc3:
    desc: "E2E: UC-4 open/external data"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc3

  e2e:security:
    desc: "E2E: API contract, authz perimeter and DCP trust chain (no EDC needed)"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow security

  e2e:fast:
    desc: "E2E: every flow that runs without the EDC"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow fast

  e2e:api-contract:
    desc: "E2E: public perimeter, anonymous/wrong-scope refusal, input validation"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow api-contract

  e2e:authz:
    desc: "E2E: cross-subject isolation, role confusion, enumeration resistance"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow authz-perimeter

  e2e:dcp:
    desc: "E2E: STS, presentation-query binding, did:web and StatusList"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow dcp-trust

  e2e:consent-purpose:
    desc: "E2E: consent vocabulary, purpose taxonomy and offer expansion"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow consent-purpose

  e2e:consent-request:
    desc: "E2E: interactive consent — request, approve, reject, revoke"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow consent-request

  e2e:org-onboarding:
    desc: "E2E: organisation onboarding lifecycle and gates"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow org-onboarding

  e2e:catalog:
    desc: "E2E: federated catalogue crawl freshness, discovery and search"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow catalog-discovery

  e2e:lineage:
    desc: "E2E: provenance graph connectivity, idempotency and audit log"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow lineage

  e2e:scenario:apply:
    desc: "E2E: provision use-case fixtures (idempotent)"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e scenario apply

  e2e:scenario:show:
    desc: "E2E: report current use-case fixture state (read-only)"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e scenario show

  e2e:scenario:destroy:
    desc: "E2E: remove the use-case fixtures this scenario created"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e scenario destroy

  e2e:chains:
    desc: "E2E: the three delegation chains (community, partner, unbundling)"
    deps: [e2e:scenario:apply]
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow chains

  e2e:health:
    desc: Check reachability of all platform services
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e health

  # ── Production secrets ──────────────────────────────────────────────────────
  secrets:generate:
    desc: Generate a production .env from .env.example (idempotent — never overwrites)
    summary: |
      Renders .env.production with every CHANGE_ME replaced by a freshly
      generated secret, and every EC P-256 key material written under
      secrets/.

      Idempotent: existing values and existing key files are preserved, so
      re-running only fills what is still missing. Nothing is ever overwritten
      — rotate explicitly with `task secrets:rotate KEY=<VAR>`.

      Output is gitignored. Feed it to the Helm chart, do not commit it.
    vars:
      OUT: '{{.OUT | default ".env.production"}}'
    cmds:
      - |
        set -eu
        OUT="{{.OUT}}"
        mkdir -p secrets

        if [ ! -f "$OUT" ]; then
          echo "→ creating $OUT from .env.example"
          cp .env.example "$OUT"
        else
          echo "→ $OUT exists; filling only missing values"
        fi

        gen() { openssl rand -hex 32; }

        # Replace each remaining CHANGE_ME with a distinct generated secret.
        # Non-secret CHANGE_ME placeholders (hostnames, DIDs) are left alone —
        # they need human input, and the guard will name them at startup.
        SECRET_VARS="EDC_API_KEY IDENTITY_REGISTRY_ENCRYPTION_KEY AUTH_SECRET \
          KEYCLOAK_ADMIN_PASSWORD POSTGRES_PASSWORD \
          SVC_DS_IDENTITY_REGISTRY_SECRET SVC_DS_ONBOARDING_SECRET \
          SVC_DS_PORTAL_SECRET SVC_DS_CONNECTOR_SECRET \
          SVC_DS_FEDERATED_CATALOG_SECRET SVC_DS_DATASET_API_SECRET \
          SVC_EDC_SECRET KEYCLOAK_CLIENT_SECRET AUTH_KEYCLOAK_SECRET \
          PORTAL_SERVICE_CLIENT_SECRET"

        for var in $SECRET_VARS; do
          if grep -qE "^${var}=CHANGE_ME$" "$OUT"; then
            value="$(gen)"
            tmp="$(mktemp)"
            sed "s|^${var}=CHANGE_ME$|${var}=${value}|" "$OUT" > "$tmp"
            mv "$tmp" "$OUT"
            echo "  generated ${var}"
          fi
        done

        # Usernames need a value but not entropy.
        tmp="$(mktemp)"
        sed -e "s|^KEYCLOAK_ADMIN_USERNAME=CHANGE_ME$|KEYCLOAK_ADMIN_USERNAME=ds-admin|" \
            -e "s|^POSTGRES_USER=CHANGE_ME$|POSTGRES_USER=dataspaces|" "$OUT" > "$tmp"
        mv "$tmp" "$OUT"

        chmod 600 "$OUT"
        echo
        echo "✓ $OUT ready (mode 600)"
        echo
        remaining="$(grep -cF 'CHANGE_ME' "$OUT" || true)"
        if [ "$remaining" -gt 0 ]; then
          echo "  $remaining value(s) still need human input (hostnames, DIDs, URLs):"
          grep -nF 'CHANGE_ME' "$OUT" | grep -v '^\s*#' | sed 's/^/    /'
        fi

  secrets:keygen:
    desc: Generate EC P-256 keys for the EDC vaults and trust anchor (idempotent)
    summary: |
      Writes EC P-256 key material used by the EDC EDR signing path and the
      trust anchor into secrets/. Existing files are never overwritten, so
      this is safe to re-run as part of a bootstrap.

      The dev stack ships placeholder keys in
      services/connector/config/*-vault.properties. Those are zero-config dev
      material; a production deployment mounts the files generated here (or
      Kubernetes Secrets rendered from them) instead.
    cmds:
      - |
        set -eu
        mkdir -p secrets
        for name in provider-edr consumer-edr trust-anchor; do
          if [ -f "secrets/${name}.jwk.json" ]; then
            echo "  secrets/${name}.jwk.json exists — leaving it alone"
            continue
          fi
          uv run --with cryptography python - "$name" <<'PY'
        import json, sys, base64
        from cryptography.hazmat.primitives.asymmetric import ec

        name = sys.argv[1]

        def b64(n: int) -> str:
            return base64.urlsafe_b64encode(n.to_bytes(32, "big")).rstrip(b"=").decode()

        key = ec.generate_private_key(ec.SECP256R1())
        pub = key.public_key().public_numbers()
        priv = {
            "kty": "EC", "crv": "P-256", "kid": f"{name}-key-1",
            "x": b64(pub.x), "y": b64(pub.y),
            "d": b64(key.private_numbers().private_value),
        }
        public = {k: v for k, v in priv.items() if k != "d"}

        with open(f"secrets/{name}.jwk.json", "w") as fh:
            json.dump(priv, fh, indent=2)
        with open(f"secrets/{name}.public.jwk.json", "w") as fh:
            json.dump(public, fh, indent=2)
        print(f"  generated secrets/{name}.jwk.json (+ .public)")
        PY
        done
        chmod 600 secrets/*.jwk.json 2>/dev/null || true
        echo
        echo "✓ key material in secrets/ (gitignored, mode 600)"
        echo "  private keys → EDC vault / identity-registry"
        echo "  *.public.jwk.json → CONNECTOR_TRUST_ANCHOR_KEY_PATH"

  secrets:bootstrap:
    desc: Full production secret bootstrap (env + keys), idempotent
    cmds:
      - task: secrets:generate
      - task: secrets:keygen

  secrets:check:
    desc: Fail if any CHANGE_ME or known dev default remains in a production env file
    vars:
      FILE: '{{.FILE | default ".env.production"}}'
    cmds:
      - |
        set -eu
        FILE="{{.FILE}}"
        [ -f "$FILE" ] || { echo "✗ $FILE not found — run: task secrets:bootstrap"; exit 1; }
        rc=0
        # Only inspect assignments; comment lines legitimately name the dev
        # defaults they are warning about.
        values="$(grep -vE '^\s*(#|$)' "$FILE" || true)"
        if printf '%s\n' "$values" | grep -nF 'CHANGE_ME'; then
          echo "✗ unresolved CHANGE_ME placeholders above"; rc=1
        fi
        for bad in insecure-dev-key dev-encryption-key-change-in-production \
                   ds-local-dev-secret dev-secret-change-in-prod \
                   change-me-local-client-secret insecure-dev-secret; do
          if printf '%s\n' "$values" | grep -nE "=${bad}\$"; then
            echo "✗ known dev default present: $bad"; rc=1
          fi
        done
        # Dev sets every service client secret equal to its own client_id.
        # Only *_SECRET vars matter here — *_CLIENT_ID legitimately holds that value.
        if printf '%s\n' "$values" | grep -nE '^[A-Z_]*SECRET=svc-ds-[a-z-]+$'; then
          echo "✗ service client secret still equals its client_id"; rc=1
        fi
        if printf '%s\n' "$values" | grep -nE '^(KEYCLOAK_ADMIN_PASSWORD|POSTGRES_PASSWORD)=(admin|postgres)$'; then
          echo "✗ weak credential above"; rc=1
        fi
        if printf '%s\n' "$values" | grep -nE '^DS_DEMO_IDENTITY_ENABLED=true$'; then
          echo "✗ EDC demo identity fallback enabled — this bypasses DSP authentication"; rc=1
        fi
        if ! grep -qE '^DS_ENV=production$' "$FILE"; then
          echo "✗ DS_ENV=production is not set — services will only warn, not fail"; rc=1
        fi
        [ "$rc" -eq 0 ] && echo "✓ $FILE carries no dev defaults"
        exit $rc

  # ── Documentation ────────────────────────────────────────────────────────
  docs:serve:
    desc: Serve docs locally with live reload (http://127.0.0.1:8000)
    cmds:
      - >-
        uv run
        --with mkdocs-material
        --with mkdocs-awesome-pages-plugin
        mkdocs serve

  docs:build:
    desc: Build docs site to site/
    cmds:
      - >-
        uv run
        --with mkdocs-material
        --with mkdocs-awesome-pages-plugin
        mkdocs build --strict

  # ── Compliance (governance validation + audit evidence) ─────────────────────
  compliance:validate:
    desc: Validate the governance file before importing it into a connector
    cmds:
      - |
        cd libs/governance && uv run ds-governance validate \
          --file ../../services/connector/governance/governance.yaml \
          --owners ../../services/identity-registry/seed/owners.dev.yaml

  compliance:validate:runtime:
    desc: Validate governance against the running identity-registry (owners + participants)
    cmds:
      - |
        cd libs/governance && uv run ds-governance validate \
          --file ../../services/connector/governance/governance.yaml \
          --identity-registry-url "${IDENTITY_REGISTRY_URL:-http://172.17.0.1:30005}"

  compliance:evidence:
    desc: Write DCAT-AP catalog and ODRL offers to reports/compliance
    cmds:
      - |
        cd libs/governance && uv run ds-governance evidence \
          --file ../../services/connector/governance/governance.yaml \
          --owners ../../services/identity-registry/seed/owners.dev.yaml \
          --name core --out-dir ../../reports/compliance

  compliance:test:
    desc: Run the governance validator test suite
    cmds:
      - cd libs/governance && uv run pytest tests/tests/ -q
