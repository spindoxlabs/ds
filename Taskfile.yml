version: "3"

# ── Root Taskfile ────────────────────────────────────────────────────────────
#
# Quick start:
#   task start
#
# All local dev defaults live in .env.local (committed).
# Override per-machine in .env (gitignored).
#
dotenv: ['.env', '.env.local']

env:
  COMPOSE_PROJECT_NAME: dataspaces

tasks:
  # ── Idempotent workspace setup ────────────────────────────────────────────
  setup:
    desc: Prepare local dev environment (installs deps in each service)
    cmds:
      - |
        for dir in services/*/; do
          if [ -f "${dir}Taskfile.yml" ]; then
            echo "→ setup ${dir}"
            task -d "${dir}" setup 2>/dev/null || true
          fi
        done

  # ── Shared infrastructure ────────────────────────────────────────────────
  infra:start:
    desc: Start shared infrastructure (postgres, caddy, identity-registry, keycloak)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up -d

  infra:stop:
    desc: Stop shared infrastructure
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose down

  # ── Identity Registry bootstrap ──────────────────────────────────────────
  identity:bootstrap:
    desc: Run identity bootstrap init container (trust anchor + participants + dev users)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up identity-registry-bootstrap

  # ── Provider participant ─────────────────────────────────────────────────
  provider:start:
    desc: Start provider participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml up -d --build
        echo "Waiting for provider connector..."
        until curl -fsS http://localhost:30001/health >/dev/null 2>&1; do sleep 2; done
        KC_URL="${KEYCLOAK_TOKEN_URL}"
        TOKEN=$(curl -fsS -X POST "$KC_URL" \
          -d grant_type=client_credentials \
          -d "client_id=${SVC_DS_PORTAL_ID}" \
          -d "client_secret=${SVC_DS_PORTAL_SECRET}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
        curl -fsS -X POST http://localhost:30001/provider/sync \
          -H "Authorization: Bearer $TOKEN" >/dev/null
        echo "Provider started — gateway http://localhost:9010 — portal: task provider:portal:run"

  provider:stop:
    desc: Stop provider participant stack
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml down

  provider:status:
    desc: Show provider container status
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml ps

  provider:logs:
    desc: Follow provider logs
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml logs -f

  # ── Consumer participant ─────────────────────────────────────────────────
  consumer:start:
    desc: Start consumer participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml up -d --build
        echo "Consumer started — gateway http://localhost:9000"

  consumer:stop:
    desc: Stop consumer participant stack
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml down

  consumer:status:
    desc: Show consumer container status
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml ps

  consumer:logs:
    desc: Follow consumer logs
    cmds:
      - |
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml logs -f

  # ── Full stack aliases ───────────────────────────────────────────────────
  start:
    desc: Start everything (infra + identity bootstrap + provider + consumer)
    cmds:
      - task: infra:start
      - task: identity:bootstrap
      - task: provider:start
      - task: consumer:start

  stop:
    desc: Stop everything
    cmds:
      - task: consumer:stop
      - task: provider:stop
      - task: infra:stop

  status:
    desc: Show all running containers
    cmds:
      - docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  # ── Identity registry local dev override ──────────────────────────────────
  identity-registry:run:
    desc: Stop Docker container, run identity-registry locally on :30005
    cmds:
      - docker stop dataspaces-identity-registry-1 2>/dev/null || true
      - |
        cd services/identity-registry
        uv run uvicorn identity_registry.main:app --reload --host 0.0.0.0 --port 30005

  identity-registry:debug:
    desc: Stop Docker container, debug identity-registry on :30005 (debugpy :30905)
    cmds:
      - docker stop dataspaces-identity-registry-1 2>/dev/null || true
      - |
        cd services/identity-registry
        uv run python -m debugpy --listen 0.0.0.0:30905 --wait-for-client \
          -m uvicorn identity_registry.main:app --reload --host 0.0.0.0 --port 30005

  # ── Provider local dev overrides ─────────────────────────────────────────
  provider:connector:run:
    desc: Stop Docker container, run provider connector locally on :30001
    cmds:
      - docker stop dataspaces-ds-connector-provider-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=provider \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_PROVIDER \
        uv run uvicorn connector.main:app --reload --host 0.0.0.0 --port 30001

  provider:connector:debug:
    desc: Stop Docker container, debug provider connector on :30001 (debugpy :30901)
    cmds:
      - docker stop dataspaces-ds-connector-provider-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=provider \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_PROVIDER \
        uv run python -m debugpy --listen 0.0.0.0:30901 --wait-for-client \
          -m uvicorn connector.main:app --reload --host 0.0.0.0 --port 30001

  provider:provenance:run:
    desc: Stop Docker container, run provider provenance locally on :30000
    cmds:
      - docker stop dataspaces-ds-provenance-provider-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=$PROVENANCE_DATABASE_URL_PROVIDER \
        uv run uvicorn provenance.main:app --reload --host 0.0.0.0 --port 30000

  provider:dataset-api:run:
    desc: Stop Docker container, run dataset-api locally on :30002
    cmds:
      - docker stop dataspaces-dataset-api-provider-1 2>/dev/null || true
      - |
        cd services/dataset-api-mock
        uv run uvicorn dataset_api_mock.main:app --reload --host 0.0.0.0 --port 30002

  provider:federated-catalog:run:
    desc: Stop Docker container, run federated-catalog locally on :30003
    cmds:
      - docker stop dataspaces-ds-federated-catalog-provider-1 2>/dev/null || true
      - |
        cd services/federated-catalog
        uv run uvicorn federated_catalog.main:app --reload --host 0.0.0.0 --port 30003

  # ── Consumer local dev overrides ─────────────────────────────────────────
  consumer:connector:run:
    desc: Stop Docker container, run consumer connector locally on :31001
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_CONSUMER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_CONSUMER \
        uv run uvicorn connector.main:app --reload --host 0.0.0.0 --port 31001

  consumer:connector:debug:
    desc: Stop Docker container, debug consumer connector on :31001 (debugpy :31901)
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_CONSUMER \
        CONNECTOR_DATABASE_URL=$CONNECTOR_DATABASE_URL_CONSUMER \
        uv run python -m debugpy --listen 0.0.0.0:31901 --wait-for-client \
          -m uvicorn connector.main:app --reload --host 0.0.0.0 --port 31001

  consumer:provenance:run:
    desc: Stop Docker container, run consumer provenance locally on :31000
    cmds:
      - docker stop dataspaces-ds-provenance-consumer-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=$PROVENANCE_DATABASE_URL_CONSUMER \
        uv run uvicorn provenance.main:app --reload --host 0.0.0.0 --port 31000

  provider:portal:run:
    desc: Stop Docker container, run portal locally on :30004
    cmds:
      - docker stop dataspaces-ds-portal-1 2>/dev/null || true
      - |
        cd services/portal
        CONNECTOR_URL=http://172.17.0.1:30001 \
        PROVENANCE_URL=$CONNECTOR_PROVENANCE_URL_PROVIDER \
        FEDERATED_CATALOG_URL=http://172.17.0.1:30003 \
        IDENTITY_REGISTRY_URL=$CONNECTOR_IDENTITY_REGISTRY_URL \
        npm run dev

  # ── Local dev (all services) ──────────────────────────────────────────────
  dev:
    desc: Start infra, then open 10 service shells in tmux
    cmds:
      - task start
      - |
        tmux kill-session -t ds 2>/dev/null || true
        tmux new-session -d -s ds -n edc-provider
        tmux send-keys -t ds:edc-provider            'task edc-provider:run' Enter
        tmux new-window -t ds -n edc-consumer
        tmux send-keys -t ds:edc-consumer             'task edc-consumer:run' Enter
        tmux new-window -t ds -n identity-registry
        tmux send-keys -t ds:identity-registry        'task identity-registry:run' Enter
        tmux new-window -t ds -n provider-connector
        tmux send-keys -t ds:provider-connector       'task provider:connector:run' Enter
        tmux new-window -t ds -n provider-provenance
        tmux send-keys -t ds:provider-provenance      'task provider:provenance:run' Enter
        tmux new-window -t ds -n provider-dataset-api
        tmux send-keys -t ds:provider-dataset-api     'task provider:dataset-api:run' Enter
        tmux new-window -t ds -n provider-fed-catalog
        tmux send-keys -t ds:provider-fed-catalog     'task provider:federated-catalog:run' Enter
        tmux new-window -t ds -n provider-portal
        tmux send-keys -t ds:provider-portal          'task provider:portal:run' Enter
        tmux new-window -t ds -n consumer-connector
        tmux send-keys -t ds:consumer-connector       'task consumer:connector:run' Enter
        tmux new-window -t ds -n consumer-provenance
        tmux send-keys -t ds:consumer-provenance      'task consumer:provenance:run' Enter
        tmux attach -t ds

  # ── Utilities ────────────────────────────────────────────────────────────

  reset-demo-state:
    desc: Clear runtime requests, consents, agreements, transfers and provenance events
    cmds:
      - |
        set -euo pipefail
        compose() {
          COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true docker compose "$@"
        }
        for db in connector_provider connector_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              consumer_access_requests,
              consumer_transfers,
              contract_agreements,
              consent_requests
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        for db in provenance_provider provenance_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              domain_events,
              prov_relations,
              prov_nodes,
              access_log
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        KC_URL="${KEYCLOAK_TOKEN_URL}"
        TOKEN=$(curl -fsS -X POST "$KC_URL" \
          -d grant_type=client_credentials \
          -d "client_id=${SVC_DS_PORTAL_ID}" \
          -d "client_secret=${SVC_DS_PORTAL_SECRET}" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null) || true
        curl -fsS -X POST http://localhost:30001/provider/sync \
          -H "Authorization: Bearer $TOKEN" >/dev/null 2>&1 || true
        echo "Demo state cleared"

  # ── EDC build ────────────────────────────────────────────────────────────
  edc:base:
    desc: Build EDC base image with cached deps (run once per version bump)
    cmds:
      - docker build -f services/edc-connector/Dockerfile.base -t ds-edc-base:0.16.0 .

  edc:ensure-base:
    desc: Build EDC base image only when missing
    cmds:
      - docker image inspect ds-edc-base:0.16.0 >/dev/null 2>&1 || task edc:base

  edc:build:
    desc: Build EDC connector fat JAR via Docker (caches in data/gradle)
    cmds:
      - mkdir -p data/gradle
      - >-
        docker run --rm
        -v "{{.ROOT_DIR}}:/project"
        -v "{{.ROOT_DIR}}/data/gradle:/home/gradle/.gradle"
        -w /project
        gradle:8.12-jdk21
        gradle :edc-connector:shadowJar --no-daemon

  edc:docker:
    desc: Build EDC connector Docker image (requires ds-edc-base:0.16.0)
    cmds:
      - docker build -f services/edc-connector/Dockerfile -t ds-edc-connector:local .

  edc:restart:
    desc: Rebuild EDC fat JAR + Docker image and force-recreate both EDC containers
    deps: [edc:ensure-base]
    cmds:
      - task: edc:build
      - task: edc:docker
      - |
        docker stop dataspaces-edc-provider-1 dataspaces-edc-consumer-1 2>/dev/null || true
        docker rm -f dataspaces-edc-provider-1 dataspaces-edc-consumer-1 2>/dev/null || true
        fuser -k 19193/tcp 19194/tcp 19195/tcp 19291/tcp 29193/tcp 29194/tcp 29195/tcp 29291/tcp 2>/dev/null || true
        sleep 1
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.provider.yml up -d --build --force-recreate --no-deps edc-provider
        COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file .env.local -f docker-compose.consumer.yml up -d --build --force-recreate --no-deps edc-consumer
        echo "Waiting for EDC provider (timeout 90s)..."
        timeout 90 bash -c 'until docker inspect dataspaces-edc-provider-1 --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 3; done' \
          && echo "EDC provider ready" || echo "EDC provider failed to start"
        echo "Waiting for EDC consumer (timeout 90s)..."
        timeout 90 bash -c 'until docker inspect dataspaces-edc-consumer-1 --format "{{.State.Health.Status}}" 2>/dev/null | grep -q healthy; do sleep 3; done' \
          && echo "EDC consumer ready" || echo "EDC consumer failed to start"

  # ── EDC local dev overrides ─────────────────────────────────────────────
  edc-provider:run:
    desc: Stop Docker container, run EDC provider locally from fat JAR
    cmds:
      - docker stop dataspaces-edc-provider-1 2>/dev/null || true
      - |
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_PROVIDER" \
        exec java -Xms256m -Xmx512m \
          -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/provider.properties \
          -jar "$jar"

  edc-consumer:run:
    desc: Stop Docker container, run EDC consumer locally from fat JAR
    cmds:
      - docker stop dataspaces-edc-consumer-1 2>/dev/null || true
      - |
        jar="{{.ROOT_DIR}}/services/edc-connector/build/libs/connector.jar"
        if [ ! -f "$jar" ]; then
          echo "No connector.jar found — building..."
          task edc:build
        fi
        EDC_RECEIVER_HTTP_ENDPOINT="$EDC_RECEIVER_HTTP_ENDPOINT_CONSUMER" \
        exec java -Xms256m -Xmx512m \
          -Dedc.fs.config={{.ROOT_DIR}}/services/connector/config/consumer.properties \
          -jar "$jar"

  # ── E2E verification ─────────────────────────────────────────────────────
  e2e:
    desc: Run E2E smoke test
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow smoke

  e2e:clean:
    desc: Reset runtime state for clean E2E run
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e clean

  e2e:all:
    desc: Run all E2E flows with cleanup
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow all --clean-first

  e2e:uc1:
    desc: "E2E: UC-1 delegated consent"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc1

  e2e:uc2:
    desc: "E2E: UC-2+UC-3 owner-scoped negotiation"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc2

  e2e:uc3:
    desc: "E2E: UC-4 open/external data"
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e run --flow uc3

  e2e:health:
    desc: Check reachability of all platform services
    cmds:
      - cd libs/ds-e2e && uv run ds-e2e health

  # ── Compliance (offline validation) ─────────────────────────────────────────
  compliance:validate:
    desc: Validate core governance, DCAT-like shape, ODRL shape and compliance evidence
    cmds:
      - |
        py="${PYTHON:-services/connector/.venv/bin/python}"
        [ -x "$py" ] || py="python3"
        PYTHONPATH=libs/governance/src "$py" scripts/compliance_validate.py --profile core

  compliance:test:
    desc: Run offline compliance validator tests
    cmds:
      - |
        pytest_bin="${PYTEST:-services/connector/.venv/bin/pytest}"
        [ -x "$pytest_bin" ] || pytest_bin="pytest"
        PYTHONPATH=libs/governance/src "$pytest_bin" -q tests/test_compliance_validate.py
