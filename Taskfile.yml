version: "3"

# ── Root Taskfile ────────────────────────────────────────────────────────────
#
# Quick start:
#   cp .env.producer.example .env.producer
#   cp .env.consumer.example .env.consumer
#   task start
#
env:
  COMPOSE_PROJECT_NAME: dataspaces

tasks:
  # ── Idempotent workspace setup ────────────────────────────────────────────
  setup:
    desc: Prepare local dev environment (installs deps in each service)
    cmds:
      - |
        for dir in services/*/; do
          if [ -f "${dir}Taskfile.yml" ]; then
            echo "→ setup ${dir}"
            task -d "${dir}" setup 2>/dev/null || true
          fi
        done

  # ── Shared infrastructure ────────────────────────────────────────────────
  infra:start:
    desc: Start shared infrastructure (postgres, caddy, keycloak)
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose up -d

  infra:stop:
    desc: Stop shared infrastructure
    cmds:
      - COMPOSE_PROJECT_NAME=dataspaces docker compose down

  # ── Producer participant ─────────────────────────────────────────────────
  producer:start:
    desc: Start producer participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        env_file="${PRODUCER_ENV_FILE:-.env.producer}"
        [ -f "$env_file" ] || cp .env.producer.example "$env_file"
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.producer.yml up -d --build
        echo "Waiting for producer connector..."
        until curl -fsS http://localhost:30001/health >/dev/null 2>&1; do sleep 2; done
        curl -fsS -X POST http://localhost:30001/provider/sync >/dev/null
        echo "Producer started — gateway http://localhost:9010"

  producer:stop:
    desc: Stop producer participant stack
    cmds:
      - |
        env_file="${PRODUCER_ENV_FILE:-.env.producer}"
        [ -f "$env_file" ] || env_file=.env.producer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.producer.yml down

  producer:status:
    desc: Show producer container status
    cmds:
      - |
        env_file="${PRODUCER_ENV_FILE:-.env.producer}"
        [ -f "$env_file" ] || env_file=.env.producer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.producer.yml ps

  producer:logs:
    desc: Follow producer logs
    cmds:
      - |
        env_file="${PRODUCER_ENV_FILE:-.env.producer}"
        [ -f "$env_file" ] || env_file=.env.producer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.producer.yml logs -f

  # ── Consumer participant ─────────────────────────────────────────────────
  consumer:start:
    desc: Start consumer participant stack
    deps: [edc:ensure-base]
    cmds:
      - |
        env_file="${CONSUMER_ENV_FILE:-.env.consumer}"
        [ -f "$env_file" ] || cp .env.consumer.example "$env_file"
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.consumer.yml up -d --build
        echo "Consumer started — portal http://localhost:30004 — gateway http://localhost:9000"

  consumer:stop:
    desc: Stop consumer participant stack
    cmds:
      - |
        env_file="${CONSUMER_ENV_FILE:-.env.consumer}"
        [ -f "$env_file" ] || env_file=.env.consumer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.consumer.yml down

  consumer:status:
    desc: Show consumer container status
    cmds:
      - |
        env_file="${CONSUMER_ENV_FILE:-.env.consumer}"
        [ -f "$env_file" ] || env_file=.env.consumer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.consumer.yml ps

  consumer:logs:
    desc: Follow consumer logs
    cmds:
      - |
        env_file="${CONSUMER_ENV_FILE:-.env.consumer}"
        [ -f "$env_file" ] || env_file=.env.consumer.example
        COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true \
          docker compose --env-file "$env_file" -f docker-compose.consumer.yml logs -f

  # ── Full stack aliases ───────────────────────────────────────────────────
  start:
    desc: Start everything (infra + producer + consumer)
    cmds:
      - task: infra:start
      - task: producer:start
      - task: consumer:start

  stop:
    desc: Stop everything
    cmds:
      - task: consumer:stop
      - task: producer:stop
      - task: infra:stop

  status:
    desc: Show all running containers
    cmds:
      - docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  # ── Producer local dev overrides ─────────────────────────────────────────
  producer:connector:run:
    desc: Stop Docker container, run producer connector locally on :30001
    cmds:
      - docker stop dataspaces-ds-connector-producer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=producer \
        EDC_PROVIDER_MANAGEMENT_URL=http://172.17.0.1:19193/management \
        EDC_PROVIDER_PROTOCOL_URL=http://172.17.0.1:19194/protocol/2025-1 \
        EDC_API_KEY=insecure-dev-key \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PARTICIPANT_DID=did:web:provider.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_DATASET_API_URL=http://172.17.0.1:30002 \
        CONNECTOR_PROVENANCE_URL=http://172.17.0.1:30000 \
        CONNECTOR_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_producer \
        uv run uvicorn connector.main:app --reload --port 30001

  producer:connector:debug:
    desc: Stop Docker container, debug producer connector on :30001 (debugpy :30901)
    cmds:
      - docker stop dataspaces-ds-connector-producer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=producer \
        EDC_PROVIDER_MANAGEMENT_URL=http://172.17.0.1:19193/management \
        EDC_PROVIDER_PROTOCOL_URL=http://172.17.0.1:19194/protocol/2025-1 \
        EDC_API_KEY=insecure-dev-key \
        CONNECTOR_PARTICIPANT_ID=provider \
        CONNECTOR_PARTICIPANT_DID=did:web:provider.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_DATASET_API_URL=http://172.17.0.1:30002 \
        CONNECTOR_PROVENANCE_URL=http://172.17.0.1:30000 \
        CONNECTOR_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_producer \
        uv run python -m debugpy --listen 0.0.0.0:30901 --wait-for-client \
          -m uvicorn connector.main:app --reload --port 30001

  producer:provenance:run:
    desc: Stop Docker container, run producer provenance locally on :30000
    cmds:
      - docker stop dataspaces-ds-provenance-producer-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/provenance_producer \
        uv run uvicorn provenance.main:app --reload --port 30000

  producer:dataset-api:run:
    desc: Stop Docker container, run dataset-api locally on :30002
    cmds:
      - docker stop dataspaces-dataset-api-producer-1 2>/dev/null || true
      - |
        cd services/dataset-api-mock
        DATASET_API_CONNECTOR_INTERNAL_URL=http://172.17.0.1:30001 \
        uv run uvicorn dataset_api_mock.main:app --reload --port 30002

  producer:federated-catalog:run:
    desc: Stop Docker container, run federated-catalog locally on :30003
    cmds:
      - docker stop dataspaces-ds-federated-catalog-producer-1 2>/dev/null || true
      - |
        cd services/federated-catalog
        CATALOG_CONNECTOR_URL=http://172.17.0.1:30001 \
        uv run uvicorn federated_catalog.main:app --reload --port 30003

  # ── Consumer local dev overrides ─────────────────────────────────────────
  consumer:connector:run:
    desc: Stop Docker container, run consumer connector locally on :31001
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        EDC_CONSUMER_MANAGEMENT_URL=http://172.17.0.1:29193/management \
        EDC_CONSUMER_PROTOCOL_URL=http://172.17.0.1:29194/protocol/2025-1 \
        EDC_API_KEY=insecure-dev-key \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=http://172.17.0.1:31000 \
        CONNECTOR_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_consumer \
        uv run uvicorn connector.main:app --reload --port 31001

  consumer:connector:debug:
    desc: Stop Docker container, debug consumer connector on :31001 (debugpy :31901)
    cmds:
      - docker stop dataspaces-ds-connector-consumer-1 2>/dev/null || true
      - |
        cd services/connector
        CONNECTOR_ROLE=consumer \
        EDC_CONSUMER_MANAGEMENT_URL=http://172.17.0.1:29193/management \
        EDC_CONSUMER_PROTOCOL_URL=http://172.17.0.1:29194/protocol/2025-1 \
        EDC_API_KEY=insecure-dev-key \
        CONNECTOR_PARTICIPANT_ID=consumer \
        CONNECTOR_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_CONSUMER_PARTICIPANT_DID=did:web:consumer.dataspaces.localhost \
        CONNECTOR_PROVENANCE_URL=http://172.17.0.1:31000 \
        CONNECTOR_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/connector_consumer \
        uv run python -m debugpy --listen 0.0.0.0:31901 --wait-for-client \
          -m uvicorn connector.main:app --reload --port 31001

  consumer:provenance:run:
    desc: Stop Docker container, run consumer provenance locally on :31000
    cmds:
      - docker stop dataspaces-ds-provenance-consumer-1 2>/dev/null || true
      - |
        cd services/provenance
        PROVENANCE_DATABASE_URL=postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/provenance_consumer \
        uv run uvicorn provenance.main:app --reload --port 31000

  consumer:portal:run:
    desc: Stop Docker container, run portal locally on :30004
    cmds:
      - docker stop dataspaces-ds-portal-1 2>/dev/null || true
      - |
        cd services/portal
        CONNECTOR_URL=http://localhost:31001 \
        PROVENANCE_URL=http://localhost:31000 \
        DATASET_API_URL=http://localhost:30002 \
        CATALOGUE_URL=http://localhost:30002 \
        FEDERATED_CATALOG_URL=http://localhost:30003 \
        npm run dev

  # ── Utilities ────────────────────────────────────────────────────────────
  proxy:hosts:
    desc: Add service hostnames to /etc/hosts (requires sudo)
    cmds:
      - |
        HOSTS=(
          "127.0.0.1 provider.dataspaces.localhost"
          "127.0.0.1 consumer.dataspaces.localhost"
          "127.0.0.1 trust-anchor.dataspaces.localhost"
          "127.0.0.1 users.dataspaces.localhost"
          "127.0.0.1 connector.dataspaces.localhost"
          "127.0.0.1 connector-producer.dataspaces.localhost"
          "127.0.0.1 connector-consumer.dataspaces.localhost"
          "127.0.0.1 provenance.dataspaces.localhost"
          "127.0.0.1 provenance-producer.dataspaces.localhost"
          "127.0.0.1 provenance-consumer.dataspaces.localhost"
          "127.0.0.1 portal.dataspaces.localhost"
          "127.0.0.1 dataset-api.dataspaces.localhost"
          "127.0.0.1 federated-catalog.dataspaces.localhost"
          "127.0.0.1 keycloak.dataspaces.localhost"
          "127.0.0.1 edc-provider.dataspaces.localhost"
          "127.0.0.1 edc-consumer.dataspaces.localhost"
          "127.0.0.1 edc-provider-mgmt.dataspaces.localhost"
          "127.0.0.1 edc-consumer-mgmt.dataspaces.localhost"
          "127.0.0.1 edc-provider-public.dataspaces.localhost"
          "127.0.0.1 edc-consumer-public.dataspaces.localhost"
          "127.0.0.1 sts-provider.dataspaces.localhost"
          "127.0.0.1 sts-consumer.dataspaces.localhost"
          "127.0.0.1 vc-wallet-provider.dataspaces.localhost"
          "127.0.0.1 vc-wallet-consumer.dataspaces.localhost"
        )
        for h in "${HOSTS[@]}"; do
          grep -qF "$h" /etc/hosts || echo "$h" | sudo tee -a /etc/hosts
        done
        echo "Done"

  proxy:trust-ca:
    desc: Trust Caddy's local CA in the system store (requires sudo)
    cmds:
      - docker exec dataspaces-caddy-1 cat /data/caddy/pki/authorities/local/root.crt > /tmp/caddy-root.crt
      - sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain /tmp/caddy-root.crt 2>/dev/null ||
        sudo cp /tmp/caddy-root.crt /usr/local/share/ca-certificates/caddy.crt && sudo update-ca-certificates
      - rm /tmp/caddy-root.crt

  reset-demo-state:
    desc: Clear runtime requests, consents, agreements, transfers and provenance events
    cmds:
      - |
        set -euo pipefail
        compose() {
          COMPOSE_PROJECT_NAME=dataspaces COMPOSE_IGNORE_ORPHANS=true docker compose "$@"
        }
        for db in connector_producer connector_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              consumer_access_requests,
              consumer_transfers,
              contract_agreements,
              consent_requests
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        for db in provenance_producer provenance_consumer; do
          compose exec -T postgres psql -U postgres -d "$db" -v ON_ERROR_STOP=1 -c "
            TRUNCATE TABLE
              domain_events,
              prov_relations,
              prov_nodes,
              access_log
            RESTART IDENTITY CASCADE;
          " 2>/dev/null || true
        done
        curl -fsS -X POST http://localhost:30001/provider/sync >/dev/null 2>&1 || true
        echo "Demo state cleared"

  keys:generate:
    desc: Regenerate all EC P-256 key pairs (outputs to data/keys/)
    cmds:
      - mkdir -p data/keys
      - bash scripts/gen-keys.sh

  vcs:issue:
    desc: Issue membership VCs for all participants (outputs to data/credentials/)
    cmds:
      - mkdir -p data/credentials/provider data/credentials/consumer
      - python3 scripts/issue-vcs.py

  # ── EDC build ────────────────────────────────────────────────────────────
  edc:base:
    desc: Build EDC base image with cached deps (run once per version bump)
    cmds:
      - docker build -f services/edc-connector/Dockerfile.base -t ds-edc-base:0.16.0 .

  edc:ensure-base:
    desc: Build EDC base image only when missing
    cmds:
      - docker image inspect ds-edc-base:0.16.0 >/dev/null 2>&1 || task edc:base

  edc:build:
    desc: Build EDC connector fat JAR via Docker (caches in data/gradle)
    cmds:
      - mkdir -p data/gradle
      - >-
        docker run --rm
        -v "{{.ROOT_DIR}}:/project"
        -v "{{.ROOT_DIR}}/data/gradle:/home/gradle/.gradle"
        -w /project
        gradle:8.12-jdk21
        gradle :edc-connector:shadowJar --no-daemon

  edc:docker:
    desc: Build EDC connector Docker image (requires ds-edc-base:0.16.0)
    cmds:
      - docker build -f services/edc-connector/Dockerfile -t ds-edc-connector:local .

  # ── Compliance (reference — may need updates for new compose structure) ──
  compliance:validate:
    desc: Validate core governance, DCAT-like shape, ODRL shape and compliance evidence
    cmds:
      - |
        py="${PYTHON:-services/connector/.venv/bin/python}"
        [ -x "$py" ] || py="python3"
        PYTHONPATH=services/governance/src "$py" scripts/compliance_validate.py --profile core

  compliance:e2e:smoke:
    desc: Run runtime smoke checks against a started dataspace connector
    cmds:
      - |
        py="${PYTHON:-services/connector/.venv/bin/python}"
        [ -x "$py" ] || py="python3"
        "$py" scripts/e2e_smoke.py \
          --connector-url "${CONNECTOR_URL:-http://localhost:30001}" \
          --dataset-api-url "${DATASET_API_URL:-http://localhost:30002}" \
          --provenance-url "${PROVENANCE_URL:-http://localhost:30000}"

  compliance:test:
    desc: Run offline compliance validator tests
    cmds:
      - |
        pytest_bin="${PYTEST:-services/connector/.venv/bin/pytest}"
        [ -x "$pytest_bin" ] || pytest_bin="pytest"
        PYTHONPATH=services/governance/src "$pytest_bin" -q tests/test_compliance_validate.py
