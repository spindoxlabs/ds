# в”Ђв”Ђ tmux config for `task dev:start` в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Loaded explicitly by the `dev:start` task (tmux source-file). Not a user config.

# Mouse support (click to select window/pane, scroll, drag to resize)
set -g mouse on

# Ctrl+PageUp / Ctrl+PageDown в†’ previous / next window (no prefix needed)
bind -n C-PPage previous-window
bind -n C-NPage next-window

# Keep the window names set via `tmux new-window -n <name>`
# (don't let the running program rename them)
set -g allow-rename off
set -g automatic-rename off
set -g set-titles on

# Show the window name clearly in the status bar
set -g status-interval 5
setw -g window-status-format         ' #I:#W '
setw -g window-status-current-format ' #I:#W '
