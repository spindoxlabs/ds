# Shared infrastructure — postgres, caddy, keycloak.
# Start this first, then bring up producer and/or consumer stacks.
#
#   docker compose up -d
#   task producer:start
#   task consumer:start

networks:
  dataspaces:
    name: dataspaces
    driver: bridge

volumes:
  postgres_data:

services:
  # ── Reverse proxy + local HTTPS + DID hosting ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
      - "9010:9010"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./services/caddy/did:/did:ro
      - ./data/credentials:/credentials:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Shared PostgreSQL (one database per service, all on port 35432) ──────────
  postgres:
    image: postgres:17.4-alpine
    restart: unless-stopped
    ports:
      - "35432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Keycloak OIDC identity provider ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/keycloak/realm-dataspaces-dev.json:/opt/keycloak/data/import/realm-dataspaces-dev.json:ro
    networks: [dataspaces]
