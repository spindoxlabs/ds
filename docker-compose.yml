# Shared infrastructure — postgres, caddy, keycloak.
# Start this first, then bring up provider and/or consumer stacks.
#
#   docker compose up -d
#   task provider:start
#   task consumer:start

networks:
  dataspaces:
    name: dataspaces
    driver: bridge

volumes:
  postgres_data:

services:
  # ── Reverse proxy — consumer (:9000) and provider (:9010) gateways ───────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9010:9010"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      dataspaces:
        aliases:
          - provider.dataspaces.localhost
          - consumer.dataspaces.localhost
          - trust-anchor.dataspaces.localhost
          - users.dataspaces.localhost

  # ── Shared PostgreSQL (one database per service, all on port 35432) ──────────
  postgres:
    image: postgres:17.4-alpine
    restart: unless-stopped
    ports:
      - "35432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [dataspaces]

  # ── Identity Registry — DID lifecycle, VC issuance, STS, credential service ─
  identity-registry-db-create:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h 172.17.0.1 -p 35432 -U postgres; do sleep 1; done &&
      psql -h 172.17.0.1 -p 35432 -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'identity_registry'"'"'" |
      grep -q 1 || psql -h 172.17.0.1 -p 35432 -U postgres -c "CREATE DATABASE identity_registry"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [dataspaces]

  identity-registry-db-init:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      identity-registry-db-create:
        condition: service_completed_successfully
    environment:
      IDENTITY_REGISTRY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/identity_registry
    networks: [dataspaces]

  identity-registry:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    restart: unless-stopped
    ports:
      - "30005:30005"
    env_file:
      - path: .env.celine
        required: false
    environment:
      IDENTITY_REGISTRY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/identity_registry
      IDENTITY_REGISTRY_TRUST_ANCHOR_DOMAIN: trust-anchor.dataspaces.localhost
    depends_on:
      identity-registry-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:30005/health', timeout=2)\""]
      interval: 10s
      start_period: 15s
      retries: 10
    networks: [dataspaces]

  # ── Identity Registry bootstrap — trust anchor, participants, dev users ──────
  identity-registry-bootstrap:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    restart: "no"
    depends_on:
      identity-registry:
        condition: service_healthy
    environment:
      IDENTITY_REGISTRY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@172.17.0.1:35432/identity_registry
      IDENTITY_REGISTRY_TRUST_ANCHOR_DOMAIN: trust-anchor.dataspaces.localhost
    volumes:
      - ./services/identity-registry/seed:/seed:ro
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        ir-cli bootstrap
        ir-cli participant add \
          --did did:web:provider.dataspaces.localhost \
          --role provider \
          --dsp-address http://172.17.0.1:19194/protocol/2025-1 \
          --scope dataspaces.query --scope dataspaces.admin \
          --sts-secret insecure-dev-secret \
          --credential-service-url http://identity-registry:30005/credentials/did:web:provider.dataspaces.localhost
        ir-cli participant add \
          --did did:web:consumer.dataspaces.localhost \
          --role consumer \
          --dsp-address http://172.17.0.1:29194/protocol/2025-1 \
          --scope dataspaces.query \
          --scope owner:example-org:member \
          --sts-secret insecure-dev-secret \
          --credential-service-url http://identity-registry:30005/credentials/did:web:consumer.dataspaces.localhost
        ir-cli credential issue-data-subject \
          --subject-id consumer-user --role ConsumerUser \
          --linked-participant-did did:web:consumer.dataspaces.localhost
        ir-cli keycloak sync \
          --did did:web:users.dataspaces.localhost:consumer-user \
          --realm dataspaces \
          --user-id 00000000-0000-4000-a000-000000000002 \
          --email consumer@example.test
        ir-cli credential issue-data-subject \
          --subject-id data-subject --role DataSubject \
          --linked-participant-did did:web:provider.dataspaces.localhost
        ir-cli keycloak sync \
          --did did:web:users.dataspaces.localhost:data-subject \
          --realm dataspaces \
          --user-id 00000000-0000-4000-a000-000000000004 \
          --email subject@example.test
        ir-cli owner import --file /seed/owners.dev.yaml
        ir-cli membership add \
          --user-did did:web:users.dataspaces.localhost:data-subject \
          --organization example-org \
          --role consumer
        ir-cli membership add \
          --user-did did:web:users.dataspaces.localhost:consumer-user \
          --organization example-org \
          --role consumer
        echo "Identity bootstrap complete"
    networks: [dataspaces]

  # ── Keycloak OIDC identity provider ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    command: ["start-dev", "--import-realm", "--http-port=9080"]
    restart: unless-stopped
    ports:
      - "9080:9080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://keycloak.dataspaces.localhost:9010
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_SPI_LOGIN_DEFAULT_REALM_NAME: dataspaces
    volumes:
      - ./services/keycloak/realm-dataspaces-dev.json:/opt/keycloak/data/import/realm-dataspaces-dev.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [dataspaces]

  # ── Keycloak sync — scopes, service clients, audience mappers ───────────────
  keycloak-sync:
    image: ghcr.io/celine-eu/celine-policies:dev
    restart: "no"
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./services/keycloak/clients.yaml:/app/clients.yaml:ro
    environment:
      CELINE_KEYCLOAK_BASE_URL: http://172.17.0.1:9080
      CELINE_KEYCLOAK_REALM: dataspaces
      CELINE_KEYCLOAK_SECRETS_FILE: /tmp/.secrets.yaml
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        celine-policies keycloak bootstrap \
          --admin-user admin --admin-password admin &&
        celine-policies keycloak sync \
          --secrets-file /tmp/.secrets.yaml
    networks: [dataspaces]

  # ── Keycloak org sync — KC native organizations from organizations.yaml ────
  keycloak-org-sync:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    restart: "no"
    depends_on:
      keycloak-sync:
        condition: service_completed_successfully
    volumes:
      - ./services/keycloak/organizations.yaml:/app/organizations.yaml:ro
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        ir-cli keycloak org-sync \
          --config /app/organizations.yaml \
          --keycloak-url http://172.17.0.1:9080 \
          --admin-user admin --admin-password admin
    networks: [dataspaces]
