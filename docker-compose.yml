# Shared infrastructure — postgres, caddy, keycloak.
# Start this first, then bring up producer and/or consumer stacks.
#
#   docker compose up -d
#   task producer:start
#   task consumer:start

networks:
  dataspaces:
    name: dataspaces
    driver: bridge

volumes:
  postgres_data:

services:
  # ── Reverse proxy + local HTTPS + DID hosting ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
      - "9010:9010"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      identity-registry:
        condition: service_healthy
    networks: [dataspaces]

  # ── Shared PostgreSQL (one database per service, all on port 35432) ──────────
  postgres:
    image: postgres:17.4-alpine
    restart: unless-stopped
    ports:
      - "35432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Identity Registry — DID lifecycle, VC issuance, STS, credential service ─
  identity-registry-db-create:
    image: postgres:17
    command: |
      sh -c 'until pg_isready -h postgres -U postgres; do sleep 1; done &&
      psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='"'"'identity_registry'"'"'" |
      grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE identity_registry"'
    environment:
      PGPASSWORD: postgres
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [dataspaces]

  identity-registry-db-init:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    command: ["alembic", "--config", "alembic.ini", "upgrade", "head"]
    working_dir: /app
    restart: "no"
    depends_on:
      identity-registry-db-create:
        condition: service_completed_successfully
    environment:
      IDENTITY_REGISTRY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:35432/identity_registry
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  identity-registry:
    build:
      context: .
      dockerfile: services/identity-registry/Dockerfile
    restart: unless-stopped
    ports:
      - "30005:30005"
    environment:
      IDENTITY_REGISTRY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:35432/identity_registry
      IDENTITY_REGISTRY_TRUST_ANCHOR_DOMAIN: trust-anchor.dataspaces.localhost
    depends_on:
      identity-registry-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:30005/health', timeout=2)\""]
      interval: 10s
      start_period: 15s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [dataspaces]

  # ── Keycloak OIDC identity provider ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/keycloak/realm-dataspaces-dev.json:/opt/keycloak/data/import/realm-dataspaces-dev.json:ro
    networks: [dataspaces]
